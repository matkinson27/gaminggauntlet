<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1b1033">
<title>Rift &amp; Zingo's Gaming Gauntlet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="rz_logo.png">
<link rel="manifest" href='data:application/manifest+json,{"name":"RZ Gaming Gauntlet","short_name":"RZGG","display":"standalone","background_color":"%231b1033","theme_color":"%231b1033","icons":[]}'>
<style>
:root{
  --bg:#160e2b; --bg2:#1f1440; --panel:#2a1b52; --panel2:#34226a;
  --line:#43308a; --ink:#f3eeff; --muted:#b3a3df;
  --pink:#f06b9a; --blue:#5b8def; --purple:#9d6fd9; --gold:#f5c451;
  --red:#c02a44; --green:#7fe0a3;
  --pixel:'Press Start 2P', monospace; --body:'Inter', system-ui, sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:var(--body); color:var(--ink); background:var(--bg);
  font-size:22px;
  background-image:radial-gradient(circle at 20% 10%, rgba(157,111,217,.18), transparent 40%),
    radial-gradient(circle at 85% 80%, rgba(240,107,154,.14), transparent 45%),
    radial-gradient(circle, rgba(157,111,217,.10) 1px, transparent 1.4px);
  background-size:auto, auto, 24px 24px;
  -webkit-font-smoothing:antialiased; overflow-x:hidden;
}
.app{max-width:1100px;margin:0 auto;padding:20px 16px 40px;min-height:100%;}
.center{min-height:90vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px;}
h1,h2,h3{margin:0;}
.pixel{font-family:var(--pixel);letter-spacing:1px;line-height:1.5;}
.logo{width:340px;height:340px;border-radius:50%;image-rendering:pixelated;
  box-shadow:0 0 0 5px var(--pink), 0 0 60px rgba(240,107,154,.6);}
.title{font-family:var(--pixel);font-size:clamp(22px,5vw,42px);color:#fff;text-shadow:3px 3px 0 #4a2da0;}
.subtitle{color:var(--muted);font-size:14px;margin-top:-6px;}
.btn{font-family:var(--body);font-weight:700;font-size:20px;cursor:pointer;border:none;border-radius:12px;
  padding:13px 22px;color:#fff;background:var(--purple);transition:transform .08s, filter .15s;}
.btn:hover{filter:brightness(1.1);} .btn:active{transform:translateY(1px);}
.btn.pink{background:var(--pink);} .btn.blue{background:var(--blue);}
.btn.ghost{background:transparent;border:2px solid var(--line);color:var(--muted);}
.btn.gold{background:var(--gold);color:#3a2700;}
.btn.lg{font-size:24px;padding:22px 38px;border-radius:14px;}
.btn.sm{font-size:19px;padding:13px 20px;border-radius:9px;}
.btn:disabled{opacity:.4;cursor:default;}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:center;}
.card{background:var(--bg2);border:2px solid var(--line);border-radius:16px;padding:18px;}
.muted{color:var(--muted);} .small{font-size:17px;}
.field{display:flex;flex-direction:column;gap:6px;text-align:left;margin-bottom:14px;}
.field label{font-size:20px;font-weight:700;color:var(--muted);}
input[type=text],input[type=number],select{
  font-family:var(--body);font-size:20px;color:var(--ink);background:var(--panel);
  border:2px solid var(--line);border-radius:10px;padding:11px 12px;width:100%;}
input:focus,select:focus{outline:2px solid var(--purple);border-color:var(--purple);}
.seg{display:inline-flex;border:2px solid var(--line);border-radius:11px;overflow:hidden;}
.seg button{font-family:var(--body);font-weight:700;font-size:19px;background:transparent;color:var(--muted);
  border:none;padding:10px 16px;cursor:pointer;}
.seg button.on{background:var(--purple);color:#fff;}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--panel2);
  border:2px solid var(--line);padding:12px 18px;border-radius:12px;font-weight:600;z-index:60;box-shadow:0 8px 30px rgba(0,0,0,.4);}
/* avatar */
.av{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--pixel);font-size:20px;color:#fff;image-rendering:pixelated;border:3px solid rgba(255,255,255,.25);}
.av.sm{width:34px;height:34px;font-size:11px;border-width:2px;}
.av.lg{width:96px;height:96px;font-size:26px;}
.av img{width:100%;height:100%;border-radius:50%;image-rendering:pixelated;object-fit:cover;}
/* character grid */
.charGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;}
@media(max-width:700px){.charGrid{grid-template-columns:repeat(4,1fr);}}
.char{background:var(--panel);border:3px solid var(--line);border-radius:14px;padding:10px 6px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:6px;transition:transform .1s,border-color .15s;}
.char:hover{transform:translateY(-2px);}
.char.sel{border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,196,81,.3);}
.char .nm{font-size:17px;font-weight:700;color:var(--muted);text-align:center;}
.char .charimg{width:72px;height:72px;border-radius:50%;image-rendering:pixelated;object-fit:cover;background:var(--panel2);}
/* scoreboard */
.board-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.score-strip{display:grid;gap:10px;margin-bottom:18px;}
.pscore{display:flex;align-items:center;gap:12px;background:var(--bg2);border:2px solid var(--line);
  border-radius:14px;padding:12px 16px;}
.pscore .nm{font-weight:800;font-size:28px;}
.pscore .tot{font-family:var(--pixel);font-size:36px;margin-left:auto;}
.gems{display:flex;gap:3px;flex-wrap:wrap;max-width:160px;}
.gem{width:14px;height:14px;transform:rotate(45deg);border-radius:2px;}
.leadtag{font-family:var(--pixel);font-size:14px;padding:3px 7px;border-radius:6px;background:var(--gold);color:#3a2700;}
/* game block */
.gblock{background:var(--bg2);border:2px solid var(--line);border-radius:16px;margin-bottom:14px;overflow:hidden;}
.ghead{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:2px solid var(--line);background:var(--panel);}
.ghead .gn{font-weight:800;font-size:28px;}
.ghead .info{margin-left:auto;position:relative;cursor:help;color:var(--muted);font-weight:700;
  border:2px solid var(--line);border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:13px;}
.ghead .info .tip{display:none;position:absolute;right:0;top:30px;width:230px;background:var(--panel2);
  border:2px solid var(--line);border-radius:10px;padding:10px;font-size:12px;font-weight:500;color:var(--ink);z-index:20;text-align:left;}
.ghead .info:hover .tip{display:block;}
.gtable{width:100%;border-collapse:collapse;}
.gtable th,.gtable td{padding:12px 14px;text-align:center;border-bottom:1px solid var(--line);font-size:19px;}
.gtable th{color:var(--muted);font-size:17px;font-weight:700;}
.gtable td.pl{text-align:left;font-weight:800;}
.gtable input{width:96px;text-align:center;padding:11px;font-size:22px;}
.gtable .sc{font-family:var(--pixel);font-size:28px;}
.winchip{font-size:16px;font-weight:800;padding:3px 8px;border-radius:6px;}
/* sudden death overlay */
.overlay{position:fixed;inset:0;background:rgba(15,8,28,.9);display:flex;align-items:center;justify-content:center;z-index:80;padding:20px;}
.overlay.red{background:rgba(120,20,35,.94);}
.sd-card{max-width:460px;width:100%;background:var(--bg2);border:3px solid var(--red);border-radius:18px;padding:26px;text-align:center;}
.overlay.red .sd-card{border-color:#fff;box-shadow:0 0 40px rgba(192,42,68,.7);}
/* result */
.result-hero{text-align:center;padding:30px 0;}
.result-hero .big{font-family:var(--pixel);font-size:clamp(40px,8vw,68px);}
canvas#confetti{position:fixed;inset:0;pointer-events:none;z-index:90;}
.list-item{display:flex;align-items:center;gap:12px;background:var(--bg2);border:2px solid var(--line);
  border-radius:12px;padding:12px 16px;margin-bottom:10px;cursor:pointer;}
.list-item:hover{border-color:var(--purple);}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:10px;}
.topbar .me{display:flex;align-items:center;gap:8px;font-weight:700;}
.hs-table{width:100%;border-collapse:collapse;}
.hs-table th,.hs-table td{padding:12px 14px;border-bottom:1px solid var(--line);text-align:center;font-size:19px;}
.hs-table th{color:var(--muted);font-size:17px;}
.draft-pick{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-top:12px;}
.hovwrap{position:relative;cursor:help;}
.hovtip{display:none;position:absolute;left:50%;transform:translateX(-50%);bottom:130%;width:170px;
  background:var(--panel2);border:2px solid var(--line);border-radius:8px;padding:8px;font-size:11px;color:var(--ink);z-index:30;font-weight:500;}
.hovwrap:hover .hovtip{display:block;}
.dropfeed-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid var(--line);font-size:13px;}
.chatpanel{position:fixed;right:0;top:0;bottom:0;width:320px;background:var(--bg2);border-left:2px solid var(--line);z-index:50;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .2s;}
.chatpanel.open{transform:translateX(0);}
.chattoggle{position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:51;background:var(--pink);color:#fff;border:none;border-radius:10px 0 0 10px;padding:12px 8px;cursor:pointer;font-family:var(--body);font-weight:700;font-size:14px;writing-mode:vertical-rl;text-orientation:mixed;}
.chatpanel.open~.chattoggle{right:320px;}
.chatheader{padding:10px 14px;border-bottom:2px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex:none;}
.chatheader span{font-weight:700;font-size:16px;}
.chatmain{flex:1;display:flex;flex-direction:column;min-height:0;}
.chatmsgs{flex:1;overflow-y:auto;padding:8px 12px;display:flex;flex-direction:column;gap:6px;}
.chatrow{display:flex;align-items:flex-end;gap:6px;max-width:90%;}
.chatrow.me{align-self:flex-end;flex-direction:row-reverse;}
.chatrow .msgav{width:24px;height:24px;border-radius:50%;flex:none;image-rendering:pixelated;object-fit:cover;}
.chatbubble{padding:9px 14px;border-radius:14px;font-size:15px;line-height:1.35;max-width:100%;word-break:break-word;}
.chatrow.me .chatbubble{border-bottom-right-radius:4px;}
.chatrow.other .chatbubble{border-bottom-left-radius:4px;}
.chatbar{display:flex;gap:8px;padding:8px 10px;border-top:1px solid var(--line);flex:none;}
.chatbar input{flex:1;font-family:var(--body);font-size:16px;background:var(--panel);border:2px solid var(--line);border-radius:20px;padding:8px 14px;color:var(--ink);}
.chatbar input:focus{outline:2px solid var(--purple);border-color:var(--purple);}
.chatbar button{flex:none;}
@media(max-width:560px){ .gtable input{width:64px;} .app{padding:14px 10px 70px;} }

/* ---- mode chooser ---- */
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;max-width:760px;margin:10px auto;}
.mode-card{background:var(--bg2);border:2px solid var(--line);border-radius:18px;padding:22px 18px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;color:var(--ink);font-family:var(--body);transition:transform .1s,border-color .15s,box-shadow .15s;}
.mode-card:hover{transform:translateY(-3px);border-color:var(--purple);box-shadow:0 10px 30px rgba(0,0,0,.35);}
.mode-art{width:100%;max-width:200px;height:auto;}
.mode-name{font-family:var(--pixel);font-size:18px;color:#fff;}
.mode-sub{color:var(--muted);font-size:16px;line-height:1.4;}
@media(max-width:600px){ .mode-grid{grid-template-columns:1fr;} }

/* ---- lobby ---- */
.lobby-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;}
@media(max-width:780px){ .lobby-grid{grid-template-columns:1fr;} }
.lobby-players{display:flex;flex-direction:column;gap:8px;}
.lobby-pl{display:flex;align-items:center;gap:10px;background:var(--bg2);border:2px solid var(--line);border-radius:12px;padding:8px 12px;}
.tag-host{font-family:var(--pixel);font-size:10px;color:#3a2700;background:var(--gold);padding:2px 6px;border-radius:6px;}
.ready-dot{margin-left:auto;width:26px;height:26px;border-radius:50%;border:2px solid var(--line);color:var(--green);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;}
.ready-dot.on{border-color:var(--green);background:rgba(127,224,163,.15);}
.spin{width:34px;height:34px;border-radius:50%;border:4px solid var(--line);border-top-color:var(--pink);animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ---- ribbon header (thin: sized to the logo) ---- */
.ribbon{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:10px;background:var(--bg2);
  border:2px solid var(--line);border-radius:14px;padding:5px 12px;margin-bottom:16px;min-height:52px;}
.ribbon-l{flex:1;display:flex;justify-content:flex-start;min-width:0;}
.ribbon-c{flex:0 0 auto;display:flex;align-items:center;gap:8px;}
.ribbon-c .rzlogo{height:40px;width:40px;border-radius:50%;image-rendering:pixelated;box-shadow:0 0 0 2px var(--pink);}
.ribbon-c .ttl{font-family:var(--pixel);font-size:12px;color:#fff;max-width:34vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ribbon-r{flex:1;display:flex;justify-content:flex-end;align-items:center;gap:8px;min-width:0;}
.ribbon .coin{color:var(--gold);font-weight:800;cursor:pointer;font-size:17px;white-space:nowrap;}
.ribbon .iconbtn{background:transparent;border:2px solid var(--line);border-radius:10px;color:var(--muted);font-weight:700;cursor:pointer;padding:5px 9px;font-size:17px;line-height:1;}
.ribbon .iconbtn:hover{color:#fff;border-color:var(--purple);}
.ribbon .pname{font-weight:700;font-size:15px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ribbon .av.sm{cursor:pointer;}
@media(max-width:700px){ .ribbon .pname,.ribbon-l .lbl{display:none;} .ribbon-c .ttl{display:none;} }
.gearwrap{position:relative;}
.gearmenu{position:absolute;right:0;top:46px;background:var(--panel2);border:2px solid var(--line);border-radius:12px;
  padding:6px;min-width:200px;z-index:60;box-shadow:0 12px 34px rgba(0,0,0,.55);}
.gearmenu button{display:block;width:100%;text-align:left;background:transparent;border:none;color:var(--ink);
  font-family:var(--body);font-weight:600;font-size:16px;padding:9px 12px;border-radius:8px;cursor:pointer;}
.gearmenu button:hover{background:var(--panel);}
.gearmenu hr{border:none;border-top:1px solid var(--line);margin:4px 2px;}

/* ---- board layout: sticky scoreboard ribbon + rounds grid + chat ---- */
.wideapp .app{max-width:1400px;}
.sbribbon{position:sticky;top:64px;z-index:20;display:flex;gap:10px;justify-content:center;overflow-x:auto;overflow-y:visible;
  padding:10px 2px;margin-bottom:14px;background:linear-gradient(var(--bg),var(--bg) 72%,transparent);}
.boardmain{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:16px;align-items:start;}
.rounds-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;min-width:0;align-items:start;}
.rounds-grid .gblock{margin-bottom:0;}
.rounds-grid .gblock.wide{grid-column:1 / -1;}
.rounds-grid .gtable{display:block;overflow-x:auto;}
.chat-col{position:sticky;top:130px;height:calc(100vh - 150px);}
.chat-col .chatdock{height:100%;background:var(--bg2);border:2px solid var(--line);border-radius:16px;display:flex;flex-direction:column;overflow:hidden;}
.iconbtn.txt{font-size:15px;font-weight:700;white-space:nowrap;}
@media(max-width:1000px){
  .boardmain{grid-template-columns:1fr;}
  .rounds-grid{grid-template-columns:1fr;}
  .chat-col{display:none;}
  .sbribbon{top:60px;justify-content:flex-start;}
}

/* ---- scoreboard bubble (one per player, animation-ready) ---- */
.sbcard{position:relative;flex:0 1 300px;min-width:200px;max-width:360px;border:2px solid var(--line);border-radius:14px;
  padding:10px 12px;background:var(--bg2);overflow:visible;transition:box-shadow .25s,background .25s;}
.sbcard .np{position:absolute;inset:0;z-index:0;opacity:.5;border-radius:12px;}
.sbcard .npc{position:relative;z-index:1;}
.sbcard.lead{box-shadow:0 0 0 2px var(--gold) inset;}
.sbcard.flash-win{box-shadow:0 0 0 3px var(--green) inset;background:rgba(127,224,163,.20);}
.sbcard.flash-lose{box-shadow:0 0 0 3px var(--red) inset;background:rgba(192,42,68,.16);}
.sbcard .sb-top{display:flex;align-items:center;gap:10px;}
.sbcard .sb-mid{min-width:0;display:flex;flex-direction:column;}
.sbcard .sb-name{font-weight:800;font-size:18px;display:flex;align-items:center;gap:4px;text-shadow:0 1px 3px rgba(0,0,0,.6);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sbcard .sb-tot{font-family:var(--pixel);font-size:22px;margin-left:auto;text-shadow:0 1px 3px rgba(0,0,0,.6);}
.sbcard .gems{margin-top:4px;}
.sbcard .leadtag{margin-left:6px;}
.winfx{position:absolute;left:-6%;right:-6%;top:-65%;height:170%;z-index:5;pointer-events:none;}
.medal{display:inline-flex;vertical-align:middle;}

/* ---- lock / round complete ---- */
.lockbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:10px 16px;border-top:2px solid var(--line);background:var(--panel);}
.lockpill{display:inline-flex;align-items:center;gap:5px;font-size:14px;font-weight:700;padding:3px 10px;border-radius:20px;border:1px solid var(--line);color:var(--muted);}
.lockpill.on{color:var(--green);border-color:var(--green);background:rgba(127,224,163,.12);}
.donebadge{font-family:var(--pixel);font-size:11px;color:var(--gold);display:inline-flex;align-items:center;gap:6px;}
.gblock.done{border-color:var(--gold);}
.gblock.done .ghead{background:rgba(245,196,81,.12);}

/* ---- shop tabs + tiles ---- */
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.tab{font-family:var(--body);font-weight:700;font-size:17px;padding:9px 16px;border-radius:20px;border:2px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;}
.tab.on{background:var(--purple);color:#fff;border-color:var(--purple);}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:12px;}
.shop-tile{background:var(--panel);border:2px solid var(--line);border-radius:14px;padding:12px;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;}
.shop-tile.active{border-color:var(--gold);box-shadow:0 0 0 2px rgba(245,196,81,.25);}
.shop-tile.locked{opacity:.55;filter:grayscale(.5);}
.shop-tile .nm{font-size:16px;font-weight:700;color:var(--ink);}
.swatch{width:90px;height:90px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:var(--bg2);border:1px solid var(--line);}
.np-prev{width:100%;height:56px;border-radius:10px;border:1px solid var(--line);}
.anim-prev{width:100%;height:56px;border-radius:10px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;gap:5px;background:#0c0a18;overflow:hidden;}
.anim-dot{width:11px;height:11px;border-radius:50%;}
.npcolor{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:4px;}
.npcolor span{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.npcolor span.on{border-color:#fff;}

/* ---- win animation: trumpets + flash ---- */
.trumpet{position:fixed;top:50%;width:130px;height:auto;z-index:96;pointer-events:none;opacity:0;
  transition:transform .5s cubic-bezier(.2,.9,.3,1.3),opacity .3s;}
.trumpet.l{left:0;transform:translateY(-50%) translateX(-170%);}
.trumpet.r{right:0;transform:translateY(-50%) translateX(170%) scaleX(-1);}
.trumpet.in{opacity:1;}
.trumpet.in.l{transform:translateY(-50%) translateX(6%);}
.trumpet.in.r{transform:translateY(-50%) translateX(-6%) scaleX(-1);}
@media(prefers-reduced-motion:reduce){ .trumpet{transition:opacity .2s;} .spin{animation:none;} }
</style>
</head>
<body>
<div class="app" id="app"></div>
<canvas id="confetti"></canvas>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============ CONFIG ============ */
const SUPABASE_URL='https://yebmefxppbmlqrbiaeez.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InllYm1lZnhwcGJtbHFyYmlhZWV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MDA2OTAsImV4cCI6MjA5NzM3NjY5MH0.gJxTylVVg5e1_GcpG4z4UqHQDwKJSPszK9u8XshAGdA';

/* scoring (mirrors the sheet) */
function scaled(gameId, raw, meta, handicap){
  raw=raw||{}; meta=meta||{};
  const v=k=>parseFloat(raw[k])||0;
  switch(gameId){
    case 'mk': return Math.round(v('pts')*10);
    case 'smash': return Math.round(v('stocks')*100);
    case 'cs2': return Math.round(v('dmg')/2+(handicap||0));
    case 'rs3': return Math.round(Math.min(v('mil'),17)*100);
    case 'lol':{let b=v('k')+v('a')+v('h')-v('d'); if(raw.s)b*=1.1; return Math.round(b*20);}
    case 'fn':{let r=v('dmg'); if((meta.mode||'OG')==='OG')r+=v('rev')*50+v('reb')*100; return Math.round(r/2);}
    default:return 0;
  }
}

/* aggregate best single-round scores per game -> each player's best medal (rank 1/2/3) */
async function loadBadges(){
  S.badges={};
  const {data}=await sb.from('scores').select('profile_id,game_id,scaled');
  if(!data) return;
  const byGame={};
  data.forEach(r=>{ if(r.scaled==null||r.scaled<=0)return; (byGame[r.game_id]=byGame[r.game_id]||[]).push(r); });
  Object.entries(byGame).forEach(([gid,rows])=>{
    rows.sort((a,b)=>b.scaled-a.scaled);
    rows.slice(0,3).forEach((r,i)=>{ const rank=i+1; const cur=S.badges[r.profile_id];
      if(!cur||rank<cur.rank) S.badges[r.profile_id]={rank,game:gid,score:r.scaled}; });
  });
}

function draftScreen(){
  const order=[...setup.slots].sort(()=>Math.random()-.5); // RNG pick order
  setup._draftOrder=order; setup._remaining=pool().map(d=>d.id); setup._picked=[]; setup._turn=0;
  renderDraft();
}
function renderDraft(){
  const order=setup._draftOrder, turnPid=order[setup._turn%order.length];
  const turnP=profById(turnPid);
  app.innerHTML=`<div class="topbar"><button class="btn ghost sm" onclick="setupScreen()">&larr; Back</button>
    <div class="pixel" style="font-size:18px"><img src="rz_logo.png" style="width:28px;height:28px;border-radius:50%;vertical-align:middle;margin-right:8px">DRAFT</div><div></div></div>
  <div class="card">
    <div class="row" style="justify-content:flex-start;margin-bottom:10px">${avatar(turnP,'sm')}
      <strong style="color:${turnP.color}">${esc(turnP.name)}</strong><span class="muted">picks a game (${setup._picked.length+1} of ${setup.count})</span></div>
    <div class="draft-pick">${setup._remaining.map(id=>{const d=defById(id);return `<button class="btn" onclick="draftPick('${id}')">${esc(d.name)}</button>`;}).join('')}</div>
    <div class="muted small" style="margin-top:14px">Picked: ${setup._picked.map(id=>esc(defById(id).name)).join(', ')||'none yet'}</div>
  </div>`;
}
function draftPick(id){
  setup._picked.push(id); setup._turn++;
  if(setup._picked.length>=setup.count) return createGauntlet(setup._picked);
  renderDraft();
}

/* ---- CREATE GAUNTLET ---- */
async function createGauntlet(gameIds){
  const title=setup.title||`Gaming Gauntlet, ${dateLabel()}`;
  const {data,error}=await sb.from('gauntlets').insert({
    title, num_players:setup.players, drinking:setup.drinking, include_switch:setup.switch,
    player_ids:setup.slots, game_ids:gameIds, status:'active', sd_multiplier:0.5,
    handicaps:setup.handicaps||{}, round_meta:{}, sd:{state:'none'}, lobby:{mode:'local'}
  }).select().single();
  if(error) return toast('Error: '+error.message);
  openGauntlet(data.id);
}

/* request to join a lobby (server-side atomic), then wait for host approval */
async function joinLobby(id){
  if(!S.me) return toast('Pick a profile first');
  const {error}=await sb.rpc('request_join',{g_id:id,p_id:S.me.id});
  if(error) return toast('Could not request: '+error.message);
  // subscribe and watch for approval (added to player_ids) or denial (removed from pending)
  const {data:g}=await sb.from('gauntlets').select('*').eq('id',id).single();
  S.gauntlet=g; S.scores=[]; const {data:msgs}=await sb.from('chat').select('*').eq('gauntlet_id',id).order('created_at',{ascending:true}).limit(200); S.chat=msgs||[];
  subscribeGauntlet(id);
  if((g.player_ids||[]).includes(S.me.id)) return go('lobby');
  S.screen='waiting'; renderWaiting();
}
function renderWaiting(){
  const g=S.gauntlet;
  app.innerHTML=`<div class="center">
    <img src="rz_logo.png" class="logo" style="width:160px;height:160px" alt="RZ">
    <div class="pixel" style="font-size:16px">REQUEST SENT</div>
    <div class="muted">Waiting for the host to let you into <strong>${esc(g.title)}</strong>.</div>
    <div class="spin" style="margin-top:8px"></div>
    <button class="btn ghost sm" style="margin-top:16px" onclick="leaveLobby()">Cancel</button>
  </div>`;
}
async function enterLobby(id){ await openGauntlet(id); }
async function leaveLobby(){
  if(S.chan){ sb.removeChannel(S.chan); S.chan=null; }
  if(S.gauntlet&&S.me) await sb.rpc('deny_join',{g_id:S.gauntlet.id,p_id:S.me.id});
  S.gauntlet=null; go('landing');
}

  <div class="lobby-grid">
    <div class="card"><h3 style="margin-bottom:12px">${esc(g.title)}</h3>${settings}</div>

      <div class="lobby-players">${players.map((p,i)=>`<div class="lobby-pl">

async function setLobbyCap(n){ if(!isLobbyHost())return; await sb.from('gauntlets').update({num_players:n}).eq('id',S.gauntlet.id); }
async function setLobbyCount(n){ if(!isLobbyHost())return; await sb.rpc('lobby_merge',{g_id:S.gauntlet.id,patch:{count:n,ready:{}}}); }
async function setLobbySwitch(v){ if(!isLobbyHost())return; await sb.from('gauntlets').update({include_switch:v}).eq('id',S.gauntlet.id); await sb.rpc('lobby_merge',{g_id:S.gauntlet.id,patch:{ready:{}}}); }
async function setLobbyMethod(m){ if(!isLobbyHost())return; await sb.rpc('lobby_merge',{g_id:S.gauntlet.id,patch:{method:m,ready:{}}}); }

let lobbyHCTimer={};
function setLobbyHandicap(pid,val){ if(!isLobbyHost())return; const h={...(S.gauntlet.handicaps||{}),[pid]:val}; S.gauntlet.handicaps=h; clearTimeout(lobbyHCTimer[pid]); lobbyHCTimer[pid]=setTimeout(()=>sb.from('gauntlets').update({handicaps:h}).eq('id',S.gauntlet.id),450); }
async function toggleReady(){ if(!S.me)return; const cur=(S.gauntlet.lobby&&S.gauntlet.lobby.ready&&S.gauntlet.lobby.ready[S.me.id])||false; await sb.rpc('lobby_set_ready',{g_id:S.gauntlet.id,p_id:S.me.id,val:!cur}); }
async function approveJoin(pid){ if(!isLobbyHost())return; await sb.rpc('approve_join',{g_id:S.gauntlet.id,p_id:pid}); }
async function denyJoin(pid){ if(!isLobbyHost())return; await sb.rpc('deny_join',{g_id:S.gauntlet.id,p_id:pid}); }
async function lobbyLeave(){
  const g=S.gauntlet; if(!g) return go('landing');
  if(isLobbyHost()){
    if(!confirm('Cancel this lobby for everyone?')) return;
    await sb.from('chat').delete().eq('gauntlet_id',g.id);
    await sb.from('gauntlets').delete().eq('id',g.id);
  } else if(S.me){
    await sb.rpc('leave_lobby',{g_id:g.id,p_id:S.me.id});
  }
  if(S.chan){ sb.removeChannel(S.chan); S.chan=null; }
  S.gauntlet=null; go('landing');
}
function draftSequence(players, count){
  const n=players.length, seq=[];
  if(n<=2){ for(let i=0;i<count;i++) seq.push(players[i%n]); return seq; }
  let idx=0, dir=1;
  while(seq.length<count){ seq.push(players[idx]); idx+=dir; if(idx===n){idx=n-1;dir=-1;} else if(idx<0){idx=0;dir=1;} }
  return seq;
}
async function startGauntletFromLobby(){
  if(!isLobbyHost())return;
  const g=S.gauntlet, lob=g.lobby||{};
  const players=(g.player_ids||[]);
  const ready=lob.ready||{};
  if(!players.length||!players.every(p=>ready[p])) return toast('Everyone needs to ready up');
  const count=lob.count||4, method=lob.method||'random';
  const pl=S.defs.filter(d=>g.include_switch||!d.is_switch);
  if(!pl.length) return toast('No games available with these settings');
  if(method==='random'){
    const picked=Array.from({length:count},()=>pl[Math.floor(Math.random()*pl.length)].id);
    await sb.from('gauntlets').update({game_ids:picked,status:'active',round_meta:{}}).eq('id',g.id);
  } else {
    const seq=draftSequence(players, count);
    await sb.rpc('lobby_merge',{g_id:g.id,patch:{phase:'draft',draft:{seq,turn:0,picks:[]}}});
  }
}

  <div class="card">
    <div class="row" style="justify-content:flex-start;margin-bottom:10px">${cur?avatar(cur,'sm'):''}
      <strong style="color:${cur?cur.color:''}">${esc(cur?cur.name:'?')}</strong>
      <span class="muted">picks game ${picks.length+1} of ${count}</span></div>
    ${myTurn?`<div class="muted small" style="margin-bottom:8px">Your pick. Duplicates are allowed.</div>

      :`<div class="muted" style="padding:24px 10px;text-align:center;font-size:20px">Waiting for <strong style="color:${cur?cur.color:''}">${esc(cur?cur.name:'someone')}</strong> to pick...</div>`}
    <div class="muted small" style="margin-top:14px">Picked: ${picks.map(id=>esc((defById(id)||{}).name||id)).join(', ')||'none yet'}</div>
    <div class="muted small" style="margin-top:6px">Order: ${seq.map((pid,i)=>{const pp=profById(pid);const done=i<picks.length;const now=i===turn;return `<span style="color:${pp?pp.color:''};${now?'font-weight:800;text-decoration:underline':done?'opacity:.45':''}">${esc(pp?pp.name:'?')}</span>`;}).join(' &rarr; ')}</div>
  </div>`;
}
async function lobbyDraftPick(gid){
  const g=S.gauntlet, dr=(g.lobby&&g.lobby.draft)||{}; const seq=dr.seq||[],turn=dr.turn||0,picks=(dr.picks||[]).slice();
  if(seq[turn]!==(S.me&&S.me.id)) return;
  picks.push(gid); const count=(g.lobby&&g.lobby.count)||seq.length;
  if(picks.length>=count){
    await sb.from('gauntlets').update({game_ids:picks,status:'active',round_meta:{}}).eq('id',g.id);
  } else {
    await sb.rpc('lobby_merge',{g_id:g.id,patch:{draft:{seq,turn:turn+1,picks}}});
  }
}

async function deleteGauntlet(id,title){

async function openGauntlet(id){
  const {data:g}=await sb.from('gauntlets').select('*').eq('id',id).single();
  S.gauntlet=g;
  const {data:sc}=await sb.from('scores').select('*').eq('gauntlet_id',id);
  S.scores=sc||[];
  const {data:msgs}=await sb.from('chat').select('*').eq('gauntlet_id',id).order('created_at',{ascending:true}).limit(200);
  S.chat=msgs||[];
  subscribeGauntlet(id);
  routeGauntlet();
}
function subscribeGauntlet(id){
  if(S.chan) sb.removeChannel(S.chan);
  S.chan=sb.channel('g-'+id)
    .on('postgres_changes',{event:'*',schema:'public',table:'scores',filter:'gauntlet_id=eq.'+id},payload=>{
      const r=payload.new; if(!r)return;
      const i=S.scores.findIndex(x=>x.id===r.id); if(i>=0)S.scores[i]=r; else S.scores.push(r);
      if(S.screen==='board') refreshBoardLive();
    })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'chat',filter:'gauntlet_id=eq.'+id},payload=>{
      if(payload.new){ S.chat.push(payload.new); renderChat(); }
    })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'gauntlets',filter:'id=eq.'+id},payload=>{
      const prev=S.gauntlet; S.gauntlet=payload.new; onGauntletUpdate(prev);
    })

/* decide which screen this client should be on, given current gauntlet state */
function routeGauntlet(){
  const g=S.gauntlet; if(!g) return;
  const sd=g.sd||{};
  if(sd.state==='proposed'){ S.screen='result'; resultScreen(); return; }
  if(sd.state==='active'){ S.screen='board'; sdRoundScreen(); return; }
  if(g.status==='finished'){ S.screen='result'; resultScreen(); return; }
  if(g.status==='lobby'){
    const ph=(g.lobby&&g.lobby.phase)||'setup';
    if(ph==='draft'){ S.screen='draft'; lobbyDraftRender(); return; }
    S.screen='lobby'; lobbyScreen(); return;
  }
  go('board');
}
/* react to a realtime gauntlet row change */
function onGauntletUpdate(prev){
  const g=S.gauntlet, sd=g.sd||{};
  if(sd.state==='proposed'){ renderSD(); return; }
  if(sd.state==='active'){ sdRoundScreen(); return; }
  if(g.status==='finished'){ if(S.screen!=='result') go('result'); return; }
  if(g.status==='lobby'){
    const ph=(g.lobby&&g.lobby.phase)||'setup';
    if(ph==='draft'){ S.screen='draft'; lobbyDraftRender(); return; }
    if(S._typingLobby && S.screen==='lobby'){ return; }
    if(S.screen!=='lobby'){ S.screen='lobby'; }
    lobbyScreen();
    return;
  }
  // status active
  if(S.screen==='lobby'||S.screen==='draft'){ go('board'); return; }
  if(S.screen==='board'){
    const newly=newlyDoneRounds(prev);
    boardScreen();
    newly.forEach(ri=>celebrateRound(ri));
  }
}
function roundDoneMap(g){ const m=(g&&g.round_meta)||{}; const out={}; Object.keys(m).forEach(k=>{ if(m[k]&&m[k].done) out[k]=true; }); return out; }
function newlyDoneRounds(prev){ const before=roundDoneMap(prev),after=roundDoneMap(S.gauntlet); return Object.keys(after).filter(ri=>!before[ri]).map(Number); }

function rawFor(roundIdx, pid){ const s=S.scores.find(x=>x.round_index===roundIdx&&x.profile_id===pid); return s?s.raw:{}; }
function metaFor(roundIdx){ return (S.gauntlet.round_meta||{})[roundIdx]||{}; }
function handicapFor(pid){ return (S.gauntlet.handicaps||{})[pid]||0; }
function mergeMatchRaw(gid, raw, meta){
  const mc=MATCHES[gid]; if(!mc) return raw||{};
  const merged={}; const base=raw||{}; const isFn=gid==='fn';
  const def=defById(gid); if(!def) return base;
  def.inputs.forEach(f=>{
    if(f.type==='bool'){
      let any=false; for(let m=1;m<=mc;m++) if(base[f.key+'_'+m]) any=true;
      merged[f.key]=any;
    } else {
      let sum=0; for(let m=1;m<=mc;m++){
        const isReload=isFn&&((meta||{})['mode_'+m]||'OG')==='Reload';
        const skip=isReload&&(f.key==='rev'||f.key==='reb');
        if(!skip) sum+=(parseFloat(base[f.key+'_'+m])||0);
      }
      merged[f.key]=sum;
    }
  });
  return merged;
}
function scaledFor(roundIdx, gid, pid){ return scaled(gid, mergeMatchRaw(gid, rawFor(roundIdx,pid), metaFor(roundIdx)), metaFor(roundIdx), gid==='cs2'?handicapFor(pid):0); }
function totals(){ const g=S.gauntlet; const t={}; g.player_ids.forEach(p=>t[p]=0);
  g.game_ids.forEach((gid,ri)=>{g.player_ids.forEach(p=>{t[p]+=scaledFor(ri,gid,p);});}); return t; }
function roundsWon(){ const g=S.gauntlet; const w={}; g.player_ids.forEach(p=>w[p]=0);
  g.game_ids.forEach((gid,ri)=>{
    let max=-1,winners=[]; let any=false;
    g.player_ids.forEach(p=>{const sObj=S.scores.find(x=>x.round_index===ri&&x.profile_id===p);
      if(sObj&&Object.keys(sObj.raw||{}).length)any=true;
      const v=scaledFor(ri,gid,p); if(v>max){max=v;winners=[p];}else if(v===max)winners.push(p);});
    if(any&&max>0) winners.forEach(p=>w[p]++); // tie = both get a gem
  }); return w; }
function roundWinners(ri,gid){ const g=S.gauntlet; let max=-1,win=[],any=false;
  g.player_ids.forEach(p=>{const sObj=S.scores.find(x=>x.round_index===ri&&x.profile_id===p);
    if(sObj&&Object.keys(sObj.raw||{}).length)any=true; const v=scaledFor(ri,gid,p);
    if(v>max){max=v;win=[p];}else if(v===max)win.push(p);}); return any&&max>0?win:[]; }

/* live refresh without full rerender: update scores, gems, totals */
function refreshBoardLive(){
  const g=S.gauntlet,t=totals(),w=roundsWon(),maxTot=Math.max(0,...Object.values(t));
  g.player_ids.forEach(pid=>{
    const card=document.getElementById('sb-'+pid); if(!card)return;
    const pr=profById(pid); const lead=t[pid]===maxTot&&maxTot>0;
    card.classList.toggle('lead',lead);
    const tot=card.querySelector('.sb-tot'); if(tot)tot.innerHTML=(t[pid]||0)+(lead?' <span class="leadtag">LEAD</span>':'');
    const gems=card.querySelector('.gems'); if(gems&&pr)gems.innerHTML=gemsHtml(pr,w[pid]||0);
  });
  document.querySelectorAll('.rounds-grid .gblock').forEach((block,ri)=>{
    const gid=g.game_ids[ri]; if(!gid)return;
    const winners=roundWinners(ri,gid);
    block.querySelectorAll('.sc').forEach((sc,si)=>{ const pid=g.player_ids[si]; if(!pid)return; sc.textContent=scaledFor(ri,gid,pid); });
    block.querySelectorAll('.wincell').forEach((wc,si)=>{ const pid=g.player_ids[si]; if(!pid)return;
      wc.innerHTML=winners.includes(pid)?`<span class="winchip" style="background:${profById(pid).color};color:#1a0f2e">WIN</span>`:''; });
  });
}

async function spendCoins(amount){
  if(!S.me) return false; const cur=S.me.coins||0;
  if(cur<amount){toast('Not enough coins');return false;}
  const nc=cur-amount;
  await sb.from('profiles').update({coins:nc}).eq('id',S.me.id);
  S.me.coins=nc; const i=S.profiles.findIndex(p=>p.id===S.me.id); if(i>=0)S.profiles[i].coins=nc;
  return true;
}

async function execReroll(ri){
  document.querySelector('.overlay')?.remove();
  if(!await spendCoins(COINS.reroll)) return;
  const pool=S.defs.filter(d=>S.gauntlet.include_switch||!d.is_switch);
  const pick=pool[Math.floor(Math.random()*pool.length)];
  S.gauntlet.game_ids[ri]=pick.id; await persistGames();
  await sb.from('scores').delete().eq('gauntlet_id',S.gauntlet.id).eq('round_index',ri);
  S.scores=S.scores.filter(s=>s.round_index!==ri);
  toast('Re-rolled to '+pick.name+'! -'+COINS.reroll); openShop();
}

  const g=S.gauntlet; const cost=type==='random'?COINS.removeRandom:COINS.removeChoice;
  shopModal('REMOVE A ROUND',`<div class="muted small" style="margin-bottom:10px">Pick a round to remove.${type==='choice'?' You choose the replacement.':' A random game replaces it.'}</div>
    ${g.game_ids.map((gid,i)=>`<button class="btn" style="width:100%;margin-bottom:6px;text-align:left;font-size:15px" onclick="execRemove(${i},'${type}',${cost})">${roundSummary(i)}</button>`).join('')}`);

async function execRemove(ri,type,cost){
  document.querySelector('.overlay')?.remove();
  let replacement;
  if(type==='choice'){
    const pl=S.defs.filter(d=>S.gauntlet.include_switch||!d.is_switch);
    const pick=prompt('Replace with: '+pl.map(d=>d.name).join(', ')+' (or leave blank to just remove)');
    replacement=pick?pl.find(d=>d.name.toLowerCase()===pick.toLowerCase()):null;
    if(pick&&!replacement) return toast('Game not found');
  } else {
    const pool=S.defs.filter(d=>S.gauntlet.include_switch||!d.is_switch);
    replacement=pool[Math.floor(Math.random()*pool.length)];
  }
  if(!await spendCoins(cost)) return;
  S.gauntlet.game_ids.splice(ri,1);
  await sb.from('scores').delete().eq('gauntlet_id',S.gauntlet.id).eq('round_index',ri);
  S.scores=S.scores.filter(s=>s.round_index!==ri);
  if(replacement) S.gauntlet.game_ids.push(replacement.id);
  await persistGames();
  toast('Done!'+(replacement?' Added '+replacement.name:'')+' -'+cost); openShop();
}
async function shopRerollAll(type){
  const g=S.gauntlet; const cost=type==='random'?COINS.rerollAll:COINS.rerollAllChoice;
  if(type==='choice'){
    const pl=S.defs.filter(d=>g.include_switch||!d.is_switch);
    window._picks=[]; window._pickTarget=g.game_ids.length; window._pickCost=cost;
    shopModal('RE-ROLL GAUNTLET (YOUR CHOICE)',`<div class="muted small" style="margin-bottom:10px">Pick ${g.game_ids.length} games in order.</div>
      <div>${pl.map(d=>`<button class="btn sm" style="margin:4px" onclick="addPick('${d.id}','${esc(d.name)}')">${esc(d.name)}</button>`).join('')}</div>
      <div class="muted small" style="margin-top:8px">Picked: <span id="pickCount">0</span>/${g.game_ids.length}</div>`);
  } else {
    if(!confirm('Re-roll entire gauntlet randomly for '+cost+' coins?')) return;
    if(!await spendCoins(cost)) return;
    const pool=S.defs.filter(d=>g.include_switch||!d.is_switch);
    const shuffled=[...pool].sort(()=>Math.random()-.5).slice(0,g.game_ids.length).map(d=>d.id);
    S.gauntlet.game_ids=shuffled; await persistGames();
    await sb.from('scores').delete().eq('gauntlet_id',g.id); S.scores=[];
    toast('Gauntlet re-rolled! -'+cost); openShop();
  }
}
async function addPick(id,name){
  window._picks.push(id);
  const el=document.getElementById('pickCount'); if(el) el.textContent=window._picks.length;
  if(window._picks.length>=window._pickTarget){

    if(!await spendCoins(window._pickCost)) return;

    await sb.from('scores').delete().eq('gauntlet_id',S.gauntlet.id); S.scores=[];

async function processUnlocks(g, roundWinnersArr, gauntletWinner){
  const involved=new Set(); roundWinnersArr.forEach(ws=>ws.forEach(p=>involved.add(p))); if(gauntletWinner)involved.add(gauntletWinner);
  const ids=[...involved]; if(!ids.length) return [];
  const [{data:profs},{data:owned}]=await Promise.all([
    sb.from('profiles').select('id,roll_counts').in('id',ids),
    sb.from('drops').select('profile_id,character_id').in('profile_id',ids)
  ]);
  const ownedSet={}; ids.forEach(i=>ownedSet[i]=new Set());
  (owned||[]).forEach(d=>ownedSet[d.profile_id].add(d.character_id));
  const rc={}; ids.forEach(i=>rc[i]={}); (profs||[]).forEach(p=>rc[p.id]={...(p.roll_counts||{})});
  const newDrops=[];
  function roll(pid,charId,pool,source){
    if(!ownedSet[pid]||ownedSet[pid].has(charId)) return;
    rc[pid][charId]=(rc[pid][charId]||0)+1; const cnt=rc[pid][charId];
    if(Math.random()<DROP_RATE){ ownedSet[pid].add(charId);
      newDrops.push({profile_id:pid,character_id:charId,pool,roll_count:cnt,won_on_roll:cnt,source,gauntlet_id:g.id}); }
  }
  g.game_ids.forEach((gid,ri)=>{ const rare=GAME_RARES[gid]; if(!rare) return;
    (roundWinnersArr[ri]||[]).forEach(p=>roll(p,rare,'game',gid)); });
  if(gauntletWinner) RARES_GAUNTLET.forEach(r=>roll(gauntletWinner,r.id,'gauntlet','gauntlet'));
  if(gauntletWinner) RARE_CURSORS.filter(c=>c.source==='gauntlet').forEach(c=>roll(gauntletWinner,c.id,'cursor','gauntlet'));
  for(const pid of ids){ await sb.from('profiles').update({roll_counts:rc[pid]}).eq('id',pid); }
  if(newDrops.length) await sb.from('drops').insert(newDrops);
  return newDrops;
}

async function finishGauntlet(){
  const g=S.gauntlet;
  const hasAny=g.game_ids.some((gid,ri)=>g.player_ids.some(p=>{
    const s=S.scores.find(x=>x.round_index===ri&&x.profile_id===p);
    return s&&Object.values(s.raw||{}).some(v=>v!==''&&v!=null&&v!==false&&v!==0);
  }));
  if(!hasAny) return toast('Enter scores for at least one game first');
  const btn=document.getElementById('finBtn'); if(btn){btn.disabled=true;btn.textContent='Finishing...';}
  const t=totals(),w=roundsWon();
  let max=-1,winner=null,tie=false;
  g.player_ids.forEach(p=>{if(t[p]>max){max=t[p];winner=p;tie=false;}else if(t[p]===max)tie=true;});
  const roundWinnersArr=g.game_ids.map((gid,ri)=>roundWinners(ri,gid));
  const perGame={}; g.game_ids.forEach((gid,ri)=>{if(roundWinnersArr[ri].length===1)perGame[gid]=roundWinnersArr[ri][0];});
  await sb.from('results').insert({gauntlet_id:g.id,title:g.title,winner_id:tie?null:winner,
    totals:t,rounds_won:w,per_game_winners:perGame,sudden_death:false});
  await sb.from('gauntlets').update({status:'finished'}).eq('id',g.id);
  S.gauntlet.status='finished';
  await processUnlocks(g, roundWinnersArr, tie?null:winner);
  // award coins = winning margin to the winner
  if(!tie&&winner){
    const margin=Math.abs(t[winner]-Math.max(...g.player_ids.filter(p=>p!==winner).map(p=>t[p])));
    const pr=profById(winner); const nc=(pr.coins||0)+margin;
    await sb.from('profiles').update({coins:nc}).eq('id',winner);
    pr.coins=nc; if(S.me&&S.me.id===winner) S.me.coins=nc;
    toast(esc(pr.name)+' earned '+margin+' coins');
  }
  await loadBadges();
  go('result');
}

        <td style="text-align:left;color:${pr?pr.color:''};font-weight:700">${esc(pr?pr.name:'?')}</td>
        <td class="pixel" style="color:var(--gold)">${row.scaled}</td></tr>`;}).join('')}</tbody></table>`:'<div class="muted small">No scores recorded yet.</div>'}
    </div>`).join('')}`;
    return;
  }
  app.innerHTML=`${header}
  <div class="card"><h3 style="margin-bottom:12px">Gauntlet wins</h3>
    <table class="hs-table"><thead><tr><th></th><th>Player</th><th>Wins</th><th>Played</th><th>Total pts</th><th>SD called</th><th>SD wins</th></tr></thead>
    <tbody>${ranked.map(p=>`<tr><td>${avatar(p,'sm')}</td><td style="color:${p.color};font-weight:700">${esc(p.name)}${badgeHtml(p.id)}</td>
      <td class="pixel">${wins[p.id]||0}</td><td>${played[p.id]||0}</td><td class="pixel" style="color:var(--gold)">${ptsTotal[p.id]||0}</td><td>${sdInit[p.id]||0}</td><td>${sdWins[p.id]||0}</td></tr>`).join('')}</tbody></table>
  </div>
  <div class="card" style="margin-top:14px"><h3 style="margin-bottom:12px">Total points by game</h3>
    <div style="overflow-x:auto"><table class="hs-table"><thead><tr><th>Game</th>${S.profiles.map(p=>`<th style="color:${p.color}">${esc(p.name)}</th>`).join('')}</tr></thead>
    <tbody>${S.defs.map(d=>`<tr><td style="text-align:left;font-weight:700">${esc(d.name)}</td>${S.profiles.map(p=>`<td class="pixel">${ptsGame[d.id][p.id]||0}</td>`).join('')}</tr>`).join('')}</tbody></table></div>
  </div>
  <div class="card" style="margin-top:14px"><h3 style="margin-bottom:12px">Per-game wins</h3>
    <div style="overflow-x:auto"><table class="hs-table"><thead><tr><th>Game</th>${S.profiles.map(p=>`<th style="color:${p.color}">${esc(p.name)}</th>`).join('')}</tr></thead>
    <tbody>${S.defs.map(d=>`<tr><td style="text-align:left;font-weight:700">${esc(d.name)}</td>${S.profiles.map(p=>`<td>${perGame[d.id][p.id]||0}</td>`).join('')}</tr>`).join('')}</tbody></table></div>
  </div>
  <div class="card" style="margin-top:14px"><h3 style="margin-bottom:12px">Collections</h3>
    ${S.profiles.map(p=>{const mine=(allDrops||[]).filter(d=>d.profile_id===p.id);
      return `<div style="margin-bottom:12px"><div style="font-weight:700;color:${p.color};margin-bottom:6px">${esc(p.name)} <span class="muted small">(${mine.length}/${ALL_RARES.length+ALL_RARE_CURSOR_IDS.length})</span></div>
      <div class="row" style="justify-content:flex-start;gap:8px">${mine.length?mine.map(d=>`<div class="hovwrap"><div class="av sm" style="background:var(--panel2)">${dropVisual(d.character_id)}</div><div class="hovtip">${esc(dropName(d.character_id))}<br>Roll #${d.won_on_roll} of ${d.roll_count}<br>${new Date(d.created_at).toLocaleString()}</div></div>`).join(''):'<span class="muted small">none yet</span>'}</div></div>`;}).join('')}
  </div>
  <div class="card" style="margin-top:14px"><h3 style="margin-bottom:12px">Recent drops</h3>
    ${(allDrops||[]).length?(allDrops).slice(0,25).map(d=>{const p=profById(d.profile_id);return `<div class="dropfeed-item">
      <div class="av sm" style="background:var(--panel2)">${dropVisual(d.character_id)}</div>

      <span class="muted small" style="margin-left:auto">${new Date(d.created_at).toLocaleDateString()}</span></div>`;}).join(''):'<div class="muted small">No drops yet. Win games to roll.</div>'}

}

/* ---- CELEBRATION ENGINE (fireworks + trumpets + confetti, sound-ready) ---- */
function prefersReducedMotion(){ return window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches; }
/* sound hooks: intentionally silent. Wire audio here later (winner profile + round index available). */
function playWinSound(/*winnerProfile*/_w,/*ri*/_ri){ /* TODO audio: fanfare keyed to winner.win_anim */ }
function playGauntletSound(){ /* TODO audio: end-of-gauntlet fanfare */ }
function flashScoreboard(winners){
  const g=S.gauntlet; if(!g) return;
  g.player_ids.forEach(pid=>{ const el=document.getElementById('sb-'+pid); if(!el)return;
    const cls=winners.includes(pid)?'flash-win':'flash-lose';
    el.classList.add(cls); setTimeout(()=>el.classList.remove('flash-win','flash-lose'),1500);
  });
}
function celebrateRound(ri){
  const g=S.gauntlet; if(!g) return; const gid=g.game_ids[ri]; if(!gid) return;
  const winners=roundWinners(ri,gid);
  if(!winners.length) return;
  flashScoreboard(winners);                 // base: winner green, losers red, 1.5s
  if(prefersReducedMotion()) return;
  let any=false;
  winners.forEach(pid=>{ const p=profById(pid);
    if(p&&p.win_anim){ fireworksOn(document.getElementById('fx-'+pid), winAnimById(p.win_anim).colors); any=true; }
  });
  if(any){
    const lead=profById(winners[0]);
    trumpetsIn(); burstConfetti(lead&&lead.win_anim?winAnimById(lead.win_anim).colors:null);
    playWinSound(lead||null,ri);
  }
}
function fireworksOn(container,palette){
  if(!container) return;
  const r=container.getBoundingClientRect();
  const c=document.createElement('canvas');
  c.width=Math.max(60,Math.round(r.width)); c.height=Math.max(60,Math.round(r.height));
  c.style.width='100%'; c.style.height='100%';
  container.innerHTML=''; container.appendChild(c);
  const x=c.getContext('2d');
  let parts=[]; let bursts=0; const maxBursts=3;
  function spawn(){
    const cx=c.width*(0.28+Math.random()*0.44), cy=c.height*(0.28+Math.random()*0.44);
    const col=palette[Math.floor(Math.random()*palette.length)];
    const n=16+Math.floor(Math.random()*12);
    for(let i=0;i<n;i++){const a=(Math.PI*2*i)/n+Math.random()*0.2; const sp=1+Math.random()*2.6;
      parts.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,col});}
    bursts++;
  }
  const t0=performance.now(); let last=t0; spawn();
  (function loop(now){
    const dt=Math.min(2.4,(now-last)/16.7); last=now;
    x.clearRect(0,0,c.width,c.height);
    for(const p of parts){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=0.045*dt; p.vx*=0.99; p.life-=0.016*dt;
      if(p.life>0){ x.globalAlpha=Math.max(0,p.life); x.fillStyle=p.col; x.fillRect(p.x,p.y,2.6,2.6); } }
    x.globalAlpha=1; parts=parts.filter(p=>p.life>0);
    const elapsed=now-t0;
    if(bursts<maxBursts && elapsed>bursts*480) spawn();
    if(elapsed<2600||parts.length) requestAnimationFrame(loop);
    else container.innerHTML='';
  })(t0);
}
function trumpetSVG(){
  return `<svg viewBox="0 0 130 84" xmlns="http://www.w3.org/2000/svg"><g fill="#f5c451" stroke="#a8801e" stroke-width="2.5" stroke-linejoin="round">
    <path d="M10 42 L74 24 Q98 17 120 6 Q113 42 120 78 Q98 67 74 60 L10 42 Z"/>
    <rect x="2" y="34" width="12" height="16" rx="3"/></g>
    <g fill="#fff4cf"><circle cx="48" cy="38" r="3.2"/><circle cx="64" cy="34" r="3.2"/><circle cx="80" cy="30" r="3.2"/></g></svg>`;
}
function trumpetsIn(){
  const reduce=prefersReducedMotion();
  ['l','r'].forEach(side=>{
    const d=document.createElement('div'); d.className='trumpet '+side; d.innerHTML=trumpetSVG();
    document.body.appendChild(d); void d.offsetWidth; d.classList.add('in');
    setTimeout(()=>{ d.classList.remove('in'); setTimeout(()=>d.remove(),650); }, reduce?900:1700);
  });
}
function confettiBurst(cols,count,frames){
  const c=$('#confetti'); if(!c) return; const x=c.getContext('2d'); c.width=innerWidth; c.height=innerHeight;
  let bits=Array.from({length:count},()=>({x:Math.random()*c.width,y:-20-Math.random()*c.height,
    s:4+Math.random()*6,vy:2+Math.random()*4,vx:-2+Math.random()*4,col:cols[Math.floor(Math.random()*cols.length)],r:Math.random()*6}));
  let f=0;
  (function loop(){ x.clearRect(0,0,c.width,c.height); bits.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.r+=.1;
    x.save();x.translate(b.x,b.y);x.rotate(b.r);x.fillStyle=b.col;x.fillRect(-b.s/2,-b.s/2,b.s,b.s);x.restore();});
    f++; if(f<frames)requestAnimationFrame(loop); else x.clearRect(0,0,c.width,c.height); })();
}
function burstConfetti(palette){ confettiBurst(palette&&palette.length?palette:['#f06b9a','#5b8def','#9d6fd9','#f5c451','#7fe0a3'],90,150); }
function fireConfetti(){ playGauntletSound(); confettiBurst(['#f06b9a','#5b8def','#9d6fd9','#f5c451','#7fe0a3'],160,210); if(!prefersReducedMotion()) trumpetsIn(); }

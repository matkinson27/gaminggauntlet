<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1b1033">
<title>Rift &amp; Zingo's Gaming Gauntlet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="manifest" href='data:application/manifest+json,{"name":"RZ Gaming Gauntlet","short_name":"RZGG","display":"standalone","background_color":"%231b1033","theme_color":"%231b1033","icons":[]}'>
<style>
:root{
  --bg:#160e2b; --bg2:#1f1440; --panel:#2a1b52; --panel2:#34226a;
  --line:#43308a; --ink:#f3eeff; --muted:#b3a3df;
  --pink:#f06b9a; --blue:#5b8def; --purple:#9d6fd9; --gold:#f5c451;
  --red:#c02a44; --green:#7fe0a3;
  --pixel:'Press Start 2P', monospace; --body:'Inter', system-ui, sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:var(--body); color:var(--ink); background:var(--bg);
  background-image:radial-gradient(circle at 20% 10%, rgba(157,111,217,.18), transparent 40%),
    radial-gradient(circle at 85% 80%, rgba(240,107,154,.14), transparent 45%),
    radial-gradient(circle, rgba(157,111,217,.10) 1px, transparent 1.4px);
  background-size:auto, auto, 24px 24px;
  -webkit-font-smoothing:antialiased; overflow-x:hidden;
}
.app{max-width:1100px;margin:0 auto;padding:20px 16px 80px;min-height:100%;}
.center{min-height:90vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px;}
h1,h2,h3{margin:0;}
.pixel{font-family:var(--pixel);letter-spacing:1px;line-height:1.5;}
.logo{width:150px;height:150px;border-radius:50%;image-rendering:pixelated;
  box-shadow:0 0 0 4px var(--pink), 0 0 40px rgba(240,107,154,.5);}
.title{font-family:var(--pixel);font-size:clamp(15px,3.6vw,26px);color:#fff;text-shadow:3px 3px 0 #4a2da0;}
.subtitle{color:var(--muted);font-size:14px;margin-top:-6px;}
.btn{font-family:var(--body);font-weight:700;font-size:15px;cursor:pointer;border:none;border-radius:12px;
  padding:13px 22px;color:#fff;background:var(--purple);transition:transform .08s, filter .15s;}
.btn:hover{filter:brightness(1.1);} .btn:active{transform:translateY(1px);}
.btn.pink{background:var(--pink);} .btn.blue{background:var(--blue);}
.btn.ghost{background:transparent;border:2px solid var(--line);color:var(--muted);}
.btn.gold{background:var(--gold);color:#3a2700;}
.btn.lg{font-size:17px;padding:16px 30px;border-radius:14px;}
.btn.sm{font-size:13px;padding:8px 14px;border-radius:9px;}
.btn:disabled{opacity:.4;cursor:default;}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:center;}
.card{background:var(--bg2);border:2px solid var(--line);border-radius:16px;padding:18px;}
.muted{color:var(--muted);} .small{font-size:13px;}
.field{display:flex;flex-direction:column;gap:6px;text-align:left;margin-bottom:14px;}
.field label{font-size:13px;font-weight:700;color:var(--muted);}
input[type=text],input[type=number],select{
  font-family:var(--body);font-size:15px;color:var(--ink);background:var(--panel);
  border:2px solid var(--line);border-radius:10px;padding:11px 12px;width:100%;}
input:focus,select:focus{outline:2px solid var(--purple);border-color:var(--purple);}
.seg{display:inline-flex;border:2px solid var(--line);border-radius:11px;overflow:hidden;}
.seg button{font-family:var(--body);font-weight:700;font-size:14px;background:transparent;color:var(--muted);
  border:none;padding:10px 16px;cursor:pointer;}
.seg button.on{background:var(--purple);color:#fff;}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--panel2);
  border:2px solid var(--line);padding:12px 18px;border-radius:12px;font-weight:600;z-index:60;box-shadow:0 8px 30px rgba(0,0,0,.4);}
/* avatar */
.av{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--pixel);font-size:18px;color:#fff;image-rendering:pixelated;border:3px solid rgba(255,255,255,.25);}
.av.sm{width:34px;height:34px;font-size:11px;border-width:2px;}
.av.lg{width:96px;height:96px;font-size:26px;}
.av img{width:100%;height:100%;border-radius:50%;image-rendering:pixelated;object-fit:cover;}
/* character grid */
.charGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;}
@media(max-width:700px){.charGrid{grid-template-columns:repeat(4,1fr);}}
.char{background:var(--panel);border:3px solid var(--line);border-radius:14px;padding:10px 6px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:6px;transition:transform .1s,border-color .15s;}
.char:hover{transform:translateY(-2px);}
.char.sel{border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,196,81,.3);}
.char .nm{font-size:11px;font-weight:700;color:var(--muted);text-align:center;}
.char .charimg{width:72px;height:72px;border-radius:50%;image-rendering:pixelated;object-fit:cover;background:var(--panel2);}
/* scoreboard */
.board-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.score-strip{display:grid;gap:10px;margin-bottom:18px;}
.pscore{display:flex;align-items:center;gap:12px;background:var(--bg2);border:2px solid var(--line);
  border-radius:14px;padding:12px 16px;}
.pscore .nm{font-weight:800;font-size:16px;}
.pscore .tot{font-family:var(--pixel);font-size:22px;margin-left:auto;}
.gems{display:flex;gap:3px;flex-wrap:wrap;max-width:160px;}
.gem{width:14px;height:14px;transform:rotate(45deg);border-radius:2px;}
.leadtag{font-family:var(--pixel);font-size:9px;padding:3px 7px;border-radius:6px;background:var(--gold);color:#3a2700;}
/* game block */
.gblock{background:var(--bg2);border:2px solid var(--line);border-radius:16px;margin-bottom:14px;overflow:hidden;}
.ghead{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:2px solid var(--line);background:var(--panel);}
.ghead .gn{font-weight:800;font-size:16px;}
.ghead .info{margin-left:auto;position:relative;cursor:help;color:var(--muted);font-weight:700;
  border:2px solid var(--line);border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:13px;}
.ghead .info .tip{display:none;position:absolute;right:0;top:30px;width:230px;background:var(--panel2);
  border:2px solid var(--line);border-radius:10px;padding:10px;font-size:12px;font-weight:500;color:var(--ink);z-index:20;text-align:left;}
.ghead .info:hover .tip{display:block;}
.gtable{width:100%;border-collapse:collapse;}
.gtable th,.gtable td{padding:9px 10px;text-align:center;border-bottom:1px solid var(--line);font-size:14px;}
.gtable th{color:var(--muted);font-size:12px;font-weight:700;}
.gtable td.pl{text-align:left;font-weight:800;}
.gtable input{width:84px;text-align:center;padding:8px;font-size:15px;}
.gtable .sc{font-family:var(--pixel);font-size:15px;}
.winchip{font-size:11px;font-weight:800;padding:3px 8px;border-radius:6px;}
/* sudden death overlay */
.overlay{position:fixed;inset:0;background:rgba(15,8,28,.9);display:flex;align-items:center;justify-content:center;z-index:80;padding:20px;}
.overlay.red{background:rgba(120,20,35,.94);}
.sd-card{max-width:460px;width:100%;background:var(--bg2);border:3px solid var(--red);border-radius:18px;padding:26px;text-align:center;}
.overlay.red .sd-card{border-color:#fff;box-shadow:0 0 40px rgba(192,42,68,.7);}
/* result */
.result-hero{text-align:center;padding:30px 0;}
.result-hero .big{font-family:var(--pixel);font-size:clamp(20px,5vw,40px);}
canvas#confetti{position:fixed;inset:0;pointer-events:none;z-index:90;}
.list-item{display:flex;align-items:center;gap:12px;background:var(--bg2);border:2px solid var(--line);
  border-radius:12px;padding:12px 16px;margin-bottom:10px;cursor:pointer;}
.list-item:hover{border-color:var(--purple);}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:10px;}
.topbar .me{display:flex;align-items:center;gap:8px;font-weight:700;}
.hs-table{width:100%;border-collapse:collapse;}
.hs-table th,.hs-table td{padding:8px 10px;border-bottom:1px solid var(--line);text-align:center;font-size:14px;}
.hs-table th{color:var(--muted);font-size:12px;}
.draft-pick{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-top:12px;}
.hovwrap{position:relative;cursor:help;}
.hovtip{display:none;position:absolute;left:50%;transform:translateX(-50%);bottom:130%;width:170px;
  background:var(--panel2);border:2px solid var(--line);border-radius:8px;padding:8px;font-size:11px;color:var(--ink);z-index:30;font-weight:500;}
.hovwrap:hover .hovtip{display:block;}
.dropfeed-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid var(--line);font-size:13px;}
.chatstrip{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:2px solid var(--line);z-index:50;display:flex;height:220px;}
.chatsidebar{width:56px;flex:none;background:var(--bg);border-right:2px solid var(--line);display:flex;flex-direction:column;align-items:center;gap:8px;padding:10px 0;overflow-y:auto;}
.chatsidebar .chatav{width:38px;height:38px;border-radius:50%;cursor:default;position:relative;image-rendering:pixelated;object-fit:cover;border:2px solid var(--line);}
.chatsidebar .chatav:hover::after{content:attr(data-name);position:absolute;left:52px;top:50%;transform:translateY(-50%);
  background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:4px 8px;font-size:11px;font-weight:700;color:var(--ink);white-space:nowrap;z-index:60;}
.chatmain{flex:1;display:flex;flex-direction:column;min-width:0;}
.chatmsgs{flex:1;overflow-y:auto;padding:8px 14px;display:flex;flex-direction:column;gap:6px;}
.chatrow{display:flex;align-items:flex-end;gap:6px;max-width:80%;}
.chatrow.me{align-self:flex-end;flex-direction:row-reverse;}
.chatrow .msgav{width:26px;height:26px;border-radius:50%;flex:none;image-rendering:pixelated;object-fit:cover;}
.chatbubble{padding:7px 12px;border-radius:14px;font-size:13px;line-height:1.35;max-width:100%;word-break:break-word;}
.chatrow.me .chatbubble{border-bottom-right-radius:4px;}
.chatrow.other .chatbubble{border-bottom-left-radius:4px;}
.chatbar{display:flex;gap:8px;padding:8px 12px;border-top:1px solid var(--line);}
.chatbar input{flex:1;font-family:var(--body);font-size:14px;background:var(--panel);border:2px solid var(--line);border-radius:20px;padding:8px 14px;color:var(--ink);}
.chatbar input:focus{outline:2px solid var(--purple);border-color:var(--purple);}
.chatbar button{flex:none;}
@media(max-width:560px){ .gtable input{width:64px;} .app{padding:14px 10px 70px;} }
</style>
</head>
<body>
<div class="app" id="app"></div>
<canvas id="confetti"></canvas>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============ CONFIG ============ */
const SUPABASE_URL='https://yebmefxppbmlqrbiaeez.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InllYm1lZnhwcGJtbHFyYmlhZWV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MDA2OTAsImV4cCI6MjA5NzM3NjY5MH0.gJxTylVVg5e1_GcpG4z4UqHQDwKJSPszK9u8XshAGdA';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

/* characters: drop PNGs in ././<id>.png. Selectable = pickable at character select. */
const CHARACTERS = [
  /* mice - top row */
  {id:'black_pirate',name:'Captain Cheddar'},{id:'grey_ninja',name:'Shadow Squeak'},
  {id:'white_royal',name:'Princess Mimsy'},{id:'grey_royal',name:'Duke Gruyere'},
  {id:'brown_royal',name:'Prince Brie'},{id:'white_astro',name:'Astro Pip'},
  {id:'grey_wizard',name:'Whisker the Wise'},
  /* cats - bottom row */
  {id:'orange_baseball',name:'Slugger'},{id:'calico_bow',name:'Lady Patches'},
  {id:'tuxedo_king',name:'Lord Midnight'},{id:'grey_beer',name:'Hops'},
  {id:'brown_sombrero',name:'El Osito'},{id:'white_princess',name:'Lady Pearlwhisker'},
  {id:'black_princess',name:'Lady Velvet'}
];
/* rares: earned only, never selectable. Each rolls its own independent 1-in-200 per qualifying win. */
const RARES_GAUNTLET = [{id:'gold_party_mouse',name:'Goldentail'},{id:'gold_party_cat',name:'Goldenpaw'}];
const GAME_RARES = {fn:'fortnite_mouse', lol:'lol_mouse', mk:'mariokart_cat', smash:'smash_cat', cs2:'cs_cat', rs3:'rs3_mouse'};
const RARE_NAMES = {gold_party_mouse:'Goldentail',gold_party_cat:'Goldenpaw',
  fortnite_mouse:'Jonesy McSqueak',lol_mouse:'Shroomy',mariokart_cat:'Turbo',
  smash_cat:'Brawler',cs_cat:'Agent Whiskers',rs3_mouse:'Lootmouse'};
const ALL_RARES = [...RARES_GAUNTLET.map(r=>r.id), ...Object.values(GAME_RARES)];
const DROP_RATE = 1/200;
const COLORS = ['#f06b9a','#5b8def','#9d6fd9','#f5c451','#7fe0a3','#ff8a5b','#5fd0e0','#e06bd6'];

/* scoring (mirrors the sheet) */
function scaled(gameId, raw, meta, handicap){
  raw=raw||{}; meta=meta||{};
  const v=k=>parseFloat(raw[k])||0;
  switch(gameId){
    case 'mk': return Math.round(v('pts')*10);
    case 'smash': return Math.round(v('stocks')*100);
    case 'cs2': return Math.round((v('dmg')+(handicap||0))/2);
    case 'rs3': return Math.round(Math.min(v('mil'),17)*100);
    case 'lol':{let b=v('k')+v('a')+v('h')-v('d'); if(raw.s)b*=1.1; return Math.round(b*20);}
    case 'fn':{let r=v('dmg'); if((meta.mode||'OG')==='OG')r+=v('rev')*50+v('reb')*100; return Math.round(r/2);}
    default:return 0;
  }
}

/* ============ STATE ============ */
const S={ me:null, profiles:[], defs:[], gauntlet:null, scores:[], chan:null, myDrops:[], chat:[] };
const $=sel=>document.querySelector(sel);
const app=$('#app');
function toast(m){let t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2200);}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function profById(id){return S.profiles.find(p=>p.id===id);}
function dateLabel(){const d=new Date();return `${d.getMonth()+1}/${d.getDate()}/${String(d.getFullYear()).slice(2)}`;}

/* avatar element */
function avatar(p, size){
  const cls=size?(' '+size):'';
  const initial=(p.name||'?').slice(0,1).toUpperCase();
  const img=p.sprite?`<img src="./${p.sprite}.png" onerror="this.style.display='none';this.parentNode.textContent='${initial}'" style="width:100%;height:100%;border-radius:50%;image-rendering:pixelated;object-fit:cover">`:'';
  return `<div class="av${cls}" data-i="${initial}" style="background:${p.color}">${img||initial}</div>`;
}

/* ============ DATA ============ */
async function loadCore(){
  const [{data:profiles},{data:defs}] = await Promise.all([
    sb.from('profiles').select('*').order('created_at'),
    sb.from('game_defs').select('*').order('sort_order')
  ]);
  S.profiles=profiles||[]; S.defs=defs||[];
  const myId=localStorage.getItem('rzgg_me');
  if(myId) S.me=profById(myId)||null;
  await loadMyDrops();
}
async function loadMyDrops(){
  if(!S.me){ S.myDrops=[]; return; }
  const {data}=await sb.from('drops').select('character_id,roll_count,won_on_roll,created_at,source,pool').eq('profile_id',S.me.id);
  S.myDrops=data||[];
}
function ownsRare(id){ return S.myDrops.some(d=>d.character_id===id); }
function defById(id){return S.defs.find(d=>d.id===id);}

/* ============ ROUTER ============ */
async function go(screen, opt){ S.screen=screen; if(screen!=='board')removeChat(); render(screen, opt||{}); }
async function render(screen, opt){
  if(screen==='landing') return landing();
  if(screen==='character') return characterSelect(opt);
  if(screen==='setup') return setupScreen();
  if(screen==='continue') return continueScreen();
  if(screen==='board') return boardScreen();
  if(screen==='result') return resultScreen();
  if(screen==='hiscores') return hiscoresScreen();
}

/* ---- LANDING ---- */
function landing(){
  app.innerHTML=`<div class="center">
    <div class="av lg" style="background:linear-gradient(160deg,#9d6fd9,#5b8def);border:4px solid var(--pink);box-shadow:0 0 40px rgba(240,107,154,.5)">
      <img src="rz_logo.png" onerror="this.style.display='none';this.parentNode.innerHTML='<span class=pixel>RZ</span>'">
    </div>
    <div class="title">RIFT &amp; ZINGO'S<br>GAMING GAUNTLET</div>
    <div class="row" style="margin-top:10px">
      <button class="btn lg pink" onclick="go('character',{next:'setup'})">Create New Gauntlet</button>
      <button class="btn lg blue" onclick="go('character',{next:'continue'})">Continue Existing</button>
    </div>
    <button class="btn ghost sm" onclick="go('character',{next:'hiscores'})">HiScores</button>
  </div>`;
}

/* ---- CHARACTER SELECT (pick your profile) ---- */
function characterSelect(opt){
  const next=opt.next||'setup';
  const taken={}; S.profiles.forEach(p=>{if(p.sprite)taken[p.sprite]=p.name;});
  app.innerHTML=`
  <div class="topbar"><button class="btn ghost sm" onclick="go('landing')">&larr; Back</button>
    <div class="pixel" style="font-size:12px">CHOOSE YOUR CHARACTER</div><div></div></div>
  ${S.profiles.length?`<div class="card" style="margin-bottom:14px">
    <div class="field" style="margin-bottom:6px"><label>Existing profiles</label></div>
    <div class="charGrid">${S.profiles.map(p=>`
      <div class="char" onclick="pickProfile('${p.id}','${next}')">
        <img class="charimg" src="./${p.sprite||'rz_logo'}.png" onerror="this.style.display='none'">
        <div class="nm" style="color:${p.color}">${esc(p.name)}</div>
      </div>`).join('')}</div>
  </div>`:''}
  <div class="card">
    <div class="field"><label>${S.profiles.length?'Or create a new profile':'Create a profile'}</label>
      <input type="text" id="newName" placeholder="Your name" maxlength="14">
    </div>
    <div class="field"><label>Color</label>
      <div class="row" style="justify-content:flex-start" id="colorRow">
        ${COLORS.map((c,i)=>`<div onclick="selColor('${c}')" data-c="${c}" class="colorDot" style="width:34px;height:34px;border-radius:50%;background:${c};cursor:pointer;border:3px solid ${i===0?'#fff':'transparent'}"></div>`).join('')}
      </div>
    </div>
    <div class="field"><label>Character</label>
      <div class="charGrid" id="charGrid">
        <div style="grid-column:1/-1;font-size:11px;font-weight:700;color:var(--muted);padding:4px 0">Mice</div>
        ${CHARACTERS.slice(0,7).map(c=>`<div class="char" data-id="${c.id}" onclick="selChar('${c.id}')">
          <img class="charimg" src="./${c.id}.png" onerror="this.style.background='var(--panel2)'">
          <div class="nm">${c.name}${taken[c.id]?' <span style="color:var(--gold)">('+esc(taken[c.id])+')</span>':''}</div>
        </div>`).join('')}
        <div style="grid-column:1/-1;font-size:11px;font-weight:700;color:var(--muted);padding:4px 0">Cats</div>
        ${CHARACTERS.slice(7).map(c=>`<div class="char" data-id="${c.id}" onclick="selChar('${c.id}')">
          <img class="charimg" src="./${c.id}.png" onerror="this.style.background='var(--panel2)'">
          <div class="nm">${c.name}${taken[c.id]?' <span style="color:var(--gold)">('+esc(taken[c.id])+')</span>':''}</div>
        </div>`).join('')}
      </div>
    </div>
    <button class="btn pink lg" onclick="createProfile('${next}')">Create &amp; Continue</button>
  </div>
  <div class="card" style="margin-top:14px">
    <div class="field" style="margin-bottom:6px"><label>Rare characters (earned only, not selectable)</label></div>
    <div class="charGrid">${ALL_RARES.map(id=>{
      const owned=ownsRare(id); const meta=S.myDrops.find(d=>d.character_id===id);
      const isGauntlet=RARES_GAUNTLET.some(r=>r.id===id);
      const hintText=isGauntlet?'Win a gauntlet to roll for this':'Win the matching game round to roll';
      return `<div class="char" style="cursor:default;${owned?'':'opacity:.5;filter:grayscale(.8)'}">
        ${owned?`<img class="charimg" src="./${id}.png" onerror="this.style.display='none'">
        <div class="nm" style="color:var(--gold)">${RARE_NAMES[id]}</div>
        <div class="hovwrap small" style="color:var(--gold)">earned<div class="hovtip">Roll #${meta?meta.won_on_roll:'?'} of ${meta?meta.roll_count:'?'}<br>${meta?new Date(meta.created_at).toLocaleString():''}</div></div>`
        :`<div style="width:72px;height:72px;border-radius:50%;background:var(--panel);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--muted)">?</div>
        <div class="nm muted">???</div>
        <div class="hovwrap small muted">locked<div class="hovtip">${hintText}<br>1 in 200 chance per win</div></div>`}
      </div>`;}).join('')}</div>
  </div>`;

function pool(){ return S.defs.filter(d=>setup.switch||!d.is_switch); }

  setup.title=$('#gtitle').value.trim();

/* ---- DRAFT ---- */
function draftScreen(){
  const order=[...setup.slots].sort(()=>Math.random()-.5); // RNG pick order
  setup._draftOrder=order; setup._remaining=pool().map(d=>d.id); setup._picked=[]; setup._turn=0;

function draftPick(id){

async function openGauntlet(id){
  const {data:g}=await sb.from('gauntlets').select('*').eq('id',id).single();
  S.gauntlet=g;
  const {data:sc}=await sb.from('scores').select('*').eq('gauntlet_id',id);
  S.scores=sc||[];
  const {data:msgs}=await sb.from('chat').select('*').eq('gauntlet_id',id).order('created_at',{ascending:true}).limit(200);
  S.chat=msgs||[];
  if(S.chan) sb.removeChannel(S.chan);
  S.chan=sb.channel('g-'+id)
    .on('postgres_changes',{event:'*',schema:'public',table:'scores',filter:'gauntlet_id=eq.'+id},payload=>{
      const r=payload.new; if(!r)return;
      const i=S.scores.findIndex(x=>x.id===r.id); if(i>=0)S.scores[i]=r; else S.scores.push(r);
      if(S.screen==='board') refreshBoardLive();
    })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'chat',filter:'gauntlet_id=eq.'+id},payload=>{
      if(payload.new){ S.chat.push(payload.new); renderChat(); }
    })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'gauntlets',filter:'id=eq.'+id},payload=>{
      S.gauntlet=payload.new;
      if(S.gauntlet.status==='finished'&&S.screen!=='result') return go('result');
      if(S.screen==='board') boardScreen();
    })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'drops',filter:'gauntlet_id=eq.'+id},payload=>{
      if(payload.new){ dropToast(payload.new); if(S.me&&payload.new.profile_id===S.me.id){ S.myDrops.push(payload.new); } }
    })
    .subscribe();
  go('board');
}

/* ---- BOARD ---- */
function rawFor(roundIdx, pid){ const s=S.scores.find(x=>x.round_index===roundIdx&&x.profile_id===pid); return s?s.raw:{}; }
function metaFor(roundIdx){ return (S.gauntlet.round_meta||{})[roundIdx]||{}; }
function handicapFor(pid){ return (S.gauntlet.handicaps||{})[pid]||0; }
function scaledFor(roundIdx, gid, pid){ return scaled(gid, rawFor(roundIdx,pid), metaFor(roundIdx), gid==='cs2'?handicapFor(pid):0); }
function totals(){ const g=S.gauntlet; const t={}; g.player_ids.forEach(p=>t[p]=0);
  g.game_ids.forEach((gid,ri)=>{g.player_ids.forEach(p=>{t[p]+=scaledFor(ri,gid,p);});}); return t; }
function roundsWon(){ const g=S.gauntlet; const w={}; g.player_ids.forEach(p=>w[p]=0);
  g.game_ids.forEach((gid,ri)=>{
    let max=-1,winners=[]; let any=false;
    g.player_ids.forEach(p=>{const sObj=S.scores.find(x=>x.round_index===ri&&x.profile_id===p);
      if(sObj&&Object.keys(sObj.raw||{}).length)any=true;
      const v=scaledFor(ri,gid,p); if(v>max){max=v;winners=[p];}else if(v===max)winners.push(p);});
    if(any&&max>0) winners.forEach(p=>w[p]++); // tie = both get a gem
  }); return w; }
function roundWinners(ri,gid){ const g=S.gauntlet; let max=-1,win=[],any=false;
  g.player_ids.forEach(p=>{const sObj=S.scores.find(x=>x.round_index===ri&&x.profile_id===p);
    if(sObj&&Object.keys(sObj.raw||{}).length)any=true; const v=scaledFor(ri,gid,p);
    if(v>max){max=v;win=[p];}else if(v===max)win.push(p);}); return any&&max>0?win:[]; }

function boardScreen(){
  const g=S.gauntlet; const t=totals(); const w=roundsWon();

        <div class="gems">${Array.from({length:w[p.id]||0}).map(()=>`<span class="gem" style="background:${p.color}"></span>`).join('')||'<span class="muted small">no rounds won</span>'}</div></div>
      <div class="tot" style="color:${p.color}">${t[p.id]}${t[p.id]===maxTot&&maxTot>0?' <span class="leadtag">LEAD</span>':''}</div>
    </div>`).join('')}

function renderChat(){

async function sendChat(){

function removeChat(){const s=document.getElementById('chatstrip');if(s)s.remove();}
function gameBlock(gid,ri,ps){
  const d=defById(gid); const inputs=d.inputs;
  const winners=roundWinners(ri,gid);
  const isFn=gid==='fn';
  const meta=metaFor(ri);
  return `<div class="gblock">
    <div class="ghead">
      <span class="gn">Round ${ri+1}: ${esc(d.name)}</span>
      ${isFn?`<div class="seg" style="margin-left:10px">
        <button class="${(meta.mode||'OG')==='OG'?'on':''}" onclick="setMode(${ri},'OG')">OG</button>
        <button class="${meta.mode==='Reload'?'on':''}" onclick="setMode(${ri},'Reload')">Reload</button></div>`:''}
      <div class="info">?<div class="tip">${esc(d.scale_note)}</div></div>
    </div>
    <table class="gtable"><thead><tr><th class="pl">Player</th>${inputs.map(f=>`<th>${esc(f.label)}</th>`).join('')}<th>Score</th><th>Win</th></tr></thead>
    <tbody>${ps.map(p=>{const raw=rawFor(ri,p.id); const sc=scaledFor(ri,gid,p.id); const won=winners.includes(p.id);
      return `<tr><td class="pl" style="color:${p.color}"><div style="display:flex;align-items:center;gap:6px">${avatar(p,"sm")} ${esc(p.name)}</div></td>
      ${inputs.map(f=>f.type==='bool'
        ? `<td><input type="checkbox" ${raw[f.key]?'checked':''} onchange="setRaw(${ri},'${p.id}','${f.key}',this.checked)"></td>`
        : `<td><input type="number" inputmode="decimal" value="${raw[f.key]!=null?raw[f.key]:''}" oninput="setRaw(${ri},'${p.id}','${f.key}',this.value)"></td>`).join('')}
      <td class="sc" style="color:${p.color}">${sc}</td>
      <td>${won?`<span class="winchip" style="background:${p.color};color:#1a0f2e">WIN</span>`:''}</td></tr>`;}).join('')}
    </tbody></table>
  </div>`;
}
let saveTimer={};
function setRaw(ri,pid,key,val){
  let s=S.scores.find(x=>x.round_index===ri&&x.profile_id===pid);
  if(!s){ s={gauntlet_id:S.gauntlet.id,game_id:S.gauntlet.game_ids[ri],round_index:ri,profile_id:pid,raw:{}}; S.scores.push(s); }
  s.raw={...s.raw,[key]:val};
  s.scaled=scaledFor(ri,S.gauntlet.game_ids[ri],pid);
  refreshBoardLive();
  const k=ri+'-'+pid; clearTimeout(saveTimer[k]);
  saveTimer[k]=setTimeout(async()=>{
    const {data}=await sb.from('scores').upsert({
      gauntlet_id:S.gauntlet.id,game_id:S.gauntlet.game_ids[ri],round_index:ri,profile_id:pid,
      raw:s.raw,scaled:s.scaled,updated_at:new Date().toISOString()
    },{onConflict:'gauntlet_id,round_index,profile_id'}).select().single();
    if(data){const i=S.scores.findIndex(x=>x.round_index===ri&&x.profile_id===pid);if(i>=0)S.scores[i]=data;}
  },450);
}
async function setMode(ri,mode){
  const rm={...(S.gauntlet.round_meta||{})}; rm[ri]={...(rm[ri]||{}),mode};
  S.gauntlet.round_meta=rm;
  await sb.from('gauntlets').update({round_meta:rm}).eq('id',S.gauntlet.id);
  boardScreen();
}
/* live refresh without full rerender: update scores, gems, totals */
function refreshBoardLive(){
  const g=S.gauntlet,t=totals(),w=roundsWon(),maxTot=Math.max(...Object.values(t));
  g.player_ids.forEach((p,pi)=>{
    const strip=document.querySelectorAll('.pscore')[pi]; if(!strip)return;
    strip.querySelector('.tot').innerHTML=t[p]+(t[p]===maxTot&&maxTot>0?' <span class="leadtag">LEAD</span>':'');
    const col=profById(p).color;
    strip.querySelector('.gems').innerHTML=Array.from({length:w[p]||0}).map(()=>`<span class="gem" style="background:${col}"></span>`).join('')||'<span class="muted small">no rounds won</span>';
  });
  // update each round scores + win chips
  g.game_ids.forEach((gid,ri)=>{
    const winners=roundWinners(ri,gid);
    const block=document.querySelectorAll('.gblock')[ri]; if(!block)return;
    const rows=block.querySelectorAll('tbody tr');
    g.player_ids.forEach((p,pi)=>{const r=rows[pi];if(!r)return;
      r.querySelector('.sc').textContent=scaledFor(ri,gid,p);
      const wc=r.querySelectorAll('td');const last=wc[wc.length-1];
      last.innerHTML=winners.includes(p)?`<span class="winchip" style="background:${profById(p).color};color:#1a0f2e">WIN</span>`:'';
    });
  });
}

/* ---- UNLOCK ENGINE ---- */
function dropToast(d){
  const p=profById(d.profile_id); const nm=p?p.name:'Someone'; const col=p?p.color:'#fff';
  const t=document.createElement('div'); t.className='toast';
  t.style.borderColor='var(--gold)'; t.style.boxShadow='0 0 24px rgba(245,196,81,.5)';
  t.innerHTML=`<div style="display:flex;align-items:center;gap:10px">
    <div class="av sm" style="background:var(--panel2)"><img src="./${d.character_id}.png" onerror="this.style.display='none';this.parentNode.textContent='!'" style="width:100%;height:100%;border-radius:50%"></div>
    <div><div style="font-weight:800;color:var(--gold)">RARE DROP</div>
    <div class="small"><b style="color:${col}">${esc(nm)}</b> unlocked ${esc(RARE_NAMES[d.character_id]||d.character_id)}</div></div></div>`;
  document.body.appendChild(t); setTimeout(()=>t.remove(),5000);
}
async function processUnlocks(g, roundWinnersArr, gauntletWinner){
  const involved=new Set(); roundWinnersArr.forEach(ws=>ws.forEach(p=>involved.add(p))); if(gauntletWinner)involved.add(gauntletWinner);
  const ids=[...involved]; if(!ids.length) return [];
  const [{data:profs},{data:owned}]=await Promise.all([
    sb.from('profiles').select('id,roll_counts').in('id',ids),
    sb.from('drops').select('profile_id,character_id').in('profile_id',ids)
  ]);
  const ownedSet={}; ids.forEach(i=>ownedSet[i]=new Set());
  (owned||[]).forEach(d=>ownedSet[d.profile_id].add(d.character_id));
  const rc={}; ids.forEach(i=>rc[i]={}); (profs||[]).forEach(p=>rc[p.id]={...(p.roll_counts||{})});
  const newDrops=[];
  function roll(pid,charId,pool,source){
    if(!ownedSet[pid]||ownedSet[pid].has(charId)) return;
    rc[pid][charId]=(rc[pid][charId]||0)+1; const cnt=rc[pid][charId];
    if(Math.random()<DROP_RATE){ ownedSet[pid].add(charId);
      newDrops.push({profile_id:pid,character_id:charId,pool,roll_count:cnt,won_on_roll:cnt,source,gauntlet_id:g.id}); }
  }
  g.game_ids.forEach((gid,ri)=>{ const rare=GAME_RARES[gid]; if(!rare) return;
    (roundWinnersArr[ri]||[]).forEach(p=>roll(p,rare,'game',gid)); });
  if(gauntletWinner) RARES_GAUNTLET.forEach(r=>roll(gauntletWinner,r.id,'gauntlet','gauntlet'));
  for(const pid of ids){ await sb.from('profiles').update({roll_counts:rc[pid]}).eq('id',pid); }
  if(newDrops.length) await sb.from('drops').insert(newDrops);
  return newDrops;
}

/* ---- FINISH + RESULT ---- */
async function finishGauntlet(){
  const g=S.gauntlet,t=totals(),w=roundsWon();
  let max=-1,winner=null,tie=false;
  g.player_ids.forEach(p=>{if(t[p]>max){max=t[p];winner=p;tie=false;}else if(t[p]===max)tie=true;});
  const roundWinnersArr=g.game_ids.map((gid,ri)=>roundWinners(ri,gid));
  const perGame={}; g.game_ids.forEach((gid,ri)=>{if(roundWinnersArr[ri].length===1)perGame[gid]=roundWinnersArr[ri][0];});
  await sb.from('results').insert({gauntlet_id:g.id,title:g.title,winner_id:tie?null:winner,
    totals:t,rounds_won:w,per_game_winners:perGame,sudden_death:false});
  await sb.from('gauntlets').update({status:'finished'}).eq('id',g.id);
  S.gauntlet.status='finished';
  await processUnlocks(g, roundWinnersArr, tie?null:winner);
  go('result');
}
function resultScreen(){
  const g=S.gauntlet,t=totals(),w=roundsWon();
  const ranked=[...g.player_ids].sort((a,b)=>t[b]-t[a]);
  const top=ranked[0], topTie=g.player_ids.filter(p=>t[p]===t[top]).length>1;
  const meWon=S.me&&!topTie&&top===S.me.id;
  fireConfetti();
  const winnerP=profById(top);
  app.innerHTML=`
  <div class="result-hero">
    <div class="pixel muted" style="font-size:11px;margin-bottom:14px">${esc(g.title)}</div>
    ${topTie?`<div class="big" style="color:var(--gold)">IT'S A TIE</div>`:
      `${avatar(winnerP,'lg')}<div class="big" style="color:${winnerP.color};margin-top:12px">${esc(winnerP.name)} WINS</div>`}
    ${S.me?`<div class="muted" style="margin-top:10px">${meWon?'You took it down.':topTie?'Dead heat.':'Tough one. Get them next time.'}</div>`:''}
  </div>
  <div class="score-strip">${ranked.map((p,i)=>{const pr=profById(p);return `<div class="pscore">
    <span class="pixel" style="font-size:14px;width:24px;color:var(--gold)">${i+1}</span>${avatar(pr,'sm')}
    <span class="nm" style="color:${pr.color}">${esc(pr.name)}</span>
    <span class="gems" style="margin-left:10px">${Array.from({length:w[p]||0}).map(()=>`<span class="gem" style="background:${pr.color}"></span>`).join('')}</span>
    <span class="tot" style="color:${pr.color}">${t[p]}</span></div>`;}).join('')}</div>
  <div class="row" style="margin-top:24px">
    <button class="btn pink lg" onclick="playAgain()">Play Again</button>
    <button class="btn ghost lg" onclick="go('landing')">Quit</button>
  </div>
  <div class="row" style="margin-top:14px">
    ${topTie?'':`<button class="btn lg" style="background:var(--red)" onclick="proposeSD()">Sudden Death</button>`}
  </div>
  <div id="sdMount"></div>`;
  watchSD();
}
async function playAgain(){ Object.assign(setup,{players:S.gauntlet.num_players}); go('setup'); }

/* ---- SUDDEN DEATH (cross-screen vote) ---- */
async function proposeSD(){
  const t=totals(),g=S.gauntlet;
  const ranked=[...g.player_ids].sort((a,b)=>t[b]-t[a]);
  const winner=ranked[0], margin=t[ranked[0]]-t[ranked[1]];
  const headstart=Math.round(margin*(g.sd_multiplier||0.5));
  const votes={}; votes[S.me?S.me.id:'host']=true;
  const sd={state:'proposed',initiator:S.me?S.me.id:null,winner,headstart,margin,votes,game:null,mode:'OG',scores:{}};
  await sb.from('gauntlets').update({sd}).eq('id',g.id); S.gauntlet.sd=sd;
}
function watchSD(){ renderSD(); }
function renderSD(){
  const sd=S.gauntlet.sd||{state:'none'}; const mount=$('#sdMount'); if(!mount)return;
  const existing=document.querySelector('.overlay'); if(existing)existing.remove();
  if(sd.state==='none'||!sd.state) return;
  const g=S.gauntlet; const initiator=profById(sd.initiator);
  const winnerP=profById(sd.winner);
  const myVote=S.me?sd.votes&&sd.votes[S.me.id]:undefined;
  const allVoted=g.player_ids.every(p=>sd.votes&&sd.votes[p]!==undefined);
  const allYes=g.player_ids.every(p=>sd.votes&&sd.votes[p]===true);
  let body='';
  if(sd.state==='proposed'){
    body=`<div class="pixel" style="font-size:16px;color:#fff;margin-bottom:14px">SUDDEN DEATH</div>
      <p>${esc(initiator?initiator.name:'Someone')} has called sudden death.</p>
      <p class="small muted">Winner <strong style="color:${winnerP.color}">${esc(winnerP.name)}</strong> starts the final round with a <strong>${sd.headstart}</strong> point head start (half the ${sd.margin} margin). The loser buys dinner.</p>
      <p class="small">Everyone must opt in or it's off.</p>
      <div class="row" style="margin-top:16px">
        <button class="btn gold lg" onclick="voteSD(true)" ${myVote!==undefined?'disabled':''}>Accept</button>
        <button class="btn ghost lg" onclick="voteSD(false)" ${myVote!==undefined?'disabled':''}>Decline</button>
      </div>
      <div class="small muted" style="margin-top:14px">${g.player_ids.map(p=>{const v=sd.votes&&sd.votes[p];return `${esc(profById(p).name)}: ${v===true?'in':v===false?'out':'…'}`;}).join('   ')}</div>`;
    if(allVoted&&allYes){ activateSD(); }
    if(allVoted&&!allYes){ body+=`<p style="color:var(--red);margin-top:12px;font-weight:700">Someone declined. Sudden death is off.</p>
      <button class="btn ghost sm" onclick="cancelSD()">Close</button>`; }
  }
  const ov=document.createElement('div'); ov.className='overlay red';
  ov.innerHTML=`<div class="sd-card">${body}</div>`;
  document.body.appendChild(ov);
}
async function voteSD(v){
  const sd={...S.gauntlet.sd}; sd.votes={...sd.votes,[S.me?S.me.id:'host']:v};
  await sb.from('gauntlets').update({sd}).eq('id',S.gauntlet.id); S.gauntlet.sd=sd; renderSD();
}
async function cancelSD(){ const sd={state:'none'}; await sb.from('gauntlets').update({sd}).eq('id',S.gauntlet.id); S.gauntlet.sd=sd;
  const ov=document.querySelector('.overlay'); if(ov)ov.remove(); }
async function activateSD(){
  if(S.gauntlet.sd.state==='active')return;
  const sd={...S.gauntlet.sd,state:'active'};
  await sb.from('gauntlets').update({sd}).eq('id',S.gauntlet.id); S.gauntlet.sd=sd; sdRoundScreen();
}
function sdRoundScreen(){
  const ov=document.querySelector('.overlay'); if(ov)ov.remove();
  const g=S.gauntlet, sd=g.sd; const ps=g.player_ids.map(profById);
  const gameOpts=S.defs.map(d=>`<option value="${d.id}" ${sd.game===d.id?'selected':''}>${esc(d.name)}</option>`).join('');
  const def=sd.game?defById(sd.game):null;
  app.innerHTML=`<div class="topbar"><div></div><div class="pixel" style="font-size:12px;color:var(--red)">SUDDEN DEATH</div><div></div></div>
  <div class="card" style="border-color:var(--red)">
    <div class="field"><label>Final round game (pick or each name one and decide)</label>
      <select onchange="setSDGame(this.value)" style="max-width:260px"><option value="">- choose -</option>${gameOpts}</select>
      ${def&&def.id==='fn'?`<div class="seg" style="margin-top:10px"><button class="${sd.mode==='OG'?'on':''}" onclick="setSDMode('OG')">OG</button><button class="${sd.mode==='Reload'?'on':''}" onclick="setSDMode('Reload')">Reload</button></div>`:''}
    </div>
    ${def?`<table class="gtable"><thead><tr><th class="pl">Player</th>${def.inputs.map(f=>`<th>${esc(f.label)}</th>`).join('')}<th>+Start</th><th>Final</th></tr></thead>
      <tbody>${ps.map(p=>{const raw=(sd.scores&&sd.scores[p.id])||{};const base=scaled(sd.game,raw,{mode:sd.mode},sd.game==='cs2'?handicapFor(p.id):0);
        const hs=p.id===sd.winner?sd.headstart:0; const fin=base+hs;
        return `<tr><td class="pl" style="color:${p.color}"><div style="display:flex;align-items:center;gap:6px">${avatar(p,"sm")} ${esc(p.name)}</div></td>
        ${def.inputs.map(f=>f.type==='bool'?`<td><input type="checkbox" ${raw[f.key]?'checked':''} onchange="setSDRaw('${p.id}','${f.key}',this.checked)"></td>`:`<td><input type="number" value="${raw[f.key]!=null?raw[f.key]:''}" oninput="setSDRaw('${p.id}','${f.key}',this.value)"></td>`).join('')}
        <td class="muted">${hs?'+'+hs:'-'}</td><td class="sc" style="color:${p.color}">${fin}</td></tr>`;}).join('')}
      </tbody></table>
      <button class="btn gold lg" style="margin-top:16px" onclick="finishSD()">Finish Sudden Death</button>`:'<div class="muted">Choose the final game to enter scores.</div>'}
  </div>`;
}
async function setSDGame(gid){const sd={...S.gauntlet.sd,game:gid};await sb.from('gauntlets').update({sd}).eq('id',S.gauntlet.id);S.gauntlet.sd=sd;sdRoundScreen();}
async function setSDMode(m){const sd={...S.gauntlet.sd,mode:m};await sb.from('gauntlets').update({sd}).eq('id',S.gauntlet.id);S.gauntlet.sd=sd;sdRoundScreen();}
let sdTimer;
async function setSDRaw(pid,key,val){const sd={...S.gauntlet.sd};sd.scores={...sd.scores};sd.scores[pid]={...(sd.scores[pid]||{}),[key]:val};
  S.gauntlet.sd=sd; sdRoundScreen(); clearTimeout(sdTimer);
  sdTimer=setTimeout(()=>sb.from('gauntlets').update({sd}).eq('id',S.gauntlet.id),400);}
async function finishSD(){
  const g=S.gauntlet,sd=g.sd;
  let max=-1,win=null,tie=false;
  g.player_ids.forEach(p=>{const base=scaled(sd.game,(sd.scores&&sd.scores[p.id])||{},{mode:sd.mode},sd.game==='cs2'?handicapFor(p.id):0);
    const fin=base+(p.id===sd.winner?sd.headstart:0); if(fin>max){max=fin;win=p;tie=false;}else if(fin===max)tie=true;});
  await sb.from('results').insert({gauntlet_id:g.id,title:g.title+' (SD)',winner_id:tie?null:win,
    totals:totals(),rounds_won:roundsWon(),per_game_winners:{},sudden_death:true,sd_initiator:sd.initiator,sd_winner:tie?null:win});
  processUnlocks({...g, game_ids:[sd.game]}, [tie?[]:[win]], tie?null:win);
  const ndSd={...sd,state:'none'}; await sb.from('gauntlets').update({sd:ndSd}).eq('id',g.id); g.sd=ndSd;
  const winnerP=tie?null:profById(win);
  fireConfetti();
  app.innerHTML=`<div class="result-hero"><div class="pixel muted" style="font-size:11px;margin-bottom:14px">SUDDEN DEATH RESULT</div>
    ${tie?'<div class="big" style="color:var(--gold)">TIE</div>':`${avatar(winnerP,'lg')}<div class="big" style="color:${winnerP.color};margin-top:12px">${esc(winnerP.name)} WINS</div>`}
    <div class="muted" style="margin-top:10px">Loser buys dinner (Meal Wheel).</div></div>
    <div class="row" style="margin-top:20px"><button class="btn pink lg" onclick="playAgain()">Play Again</button>
    <button class="btn ghost lg" onclick="go('landing')">Quit</button></div>`;
}

/* ---- HISCORES ---- */
async function hiscoresScreen(){
  const [{data:res},{data:allDrops}]=await Promise.all([
    sb.from('results').select('*').order('finished_at',{ascending:false}).limit(500),
    sb.from('drops').select('*').order('created_at',{ascending:false}).limit(200)
  ]);
  const wins={},sdInit={},sdWins={},perGame={},played={};
  S.profiles.forEach(p=>{wins[p.id]=0;sdInit[p.id]=0;sdWins[p.id]=0;played[p.id]=0;});
  S.defs.forEach(d=>{perGame[d.id]={};S.profiles.forEach(p=>perGame[d.id][p.id]=0);});
  (res||[]).forEach(r=>{
    if(r.winner_id){wins[r.winner_id]=(wins[r.winner_id]||0)+1;}
    if(r.totals)Object.keys(r.totals).forEach(pid=>{if(played[pid]!=null)played[pid]++;});
    if(r.sd_initiator)sdInit[r.sd_initiator]=(sdInit[r.sd_initiator]||0)+1;
    if(r.sudden_death&&r.sd_winner)sdWins[r.sd_winner]=(sdWins[r.sd_winner]||0)+1;
    if(r.per_game_winners)Object.entries(r.per_game_winners).forEach(([gid,pid])=>{if(perGame[gid]&&perGame[gid][pid]!=null)perGame[gid][pid]++;});
  });
  const ranked=[...S.profiles].sort((a,b)=>(wins[b.id]||0)-(wins[a.id]||0));
  app.innerHTML=`<div class="topbar"><button class="btn ghost sm" onclick="go(S.gauntlet?'board':'landing')">&larr; Back</button>
    <div class="pixel" style="font-size:12px">HISCORES</div><div></div></div>
  <div class="card"><h3 style="margin-bottom:12px">Gauntlet wins</h3>
    <table class="hs-table"><thead><tr><th></th><th>Player</th><th>Wins</th><th>Played</th><th>SD called</th><th>SD wins</th></tr></thead>
    <tbody>${ranked.map((p,i)=>`<tr><td>${avatar(p,'sm')}</td><td style="color:${p.color};font-weight:700">${esc(p.name)}</td>
      <td class="pixel">${wins[p.id]||0}</td><td>${played[p.id]||0}</td><td>${sdInit[p.id]||0}</td><td>${sdWins[p.id]||0}</td></tr>`).join('')}</tbody></table>
  </div>
  <div class="card" style="margin-top:14px"><h3 style="margin-bottom:12px">Per-game wins</h3>
    <table class="hs-table"><thead><tr><th>Game</th>${S.profiles.map(p=>`<th style="color:${p.color}">${esc(p.name)}</th>`).join('')}</tr></thead>
    <tbody>${S.defs.map(d=>`<tr><td style="text-align:left;font-weight:700">${esc(d.name)}</td>${S.profiles.map(p=>`<td>${perGame[d.id][p.id]||0}</td>`).join('')}</tr>`).join('')}</tbody></table>
  </div>
  <div class="card" style="margin-top:14px"><h3 style="margin-bottom:12px">Collections</h3>
    ${S.profiles.map(p=>{const mine=(allDrops||[]).filter(d=>d.profile_id===p.id);
      return `<div style="margin-bottom:12px"><div style="font-weight:700;color:${p.color};margin-bottom:6px">${esc(p.name)} <span class="muted small">(${mine.length}/${ALL_RARES.length})</span></div>
      <div class="row" style="justify-content:flex-start;gap:8px">${mine.length?mine.map(d=>`<div class="hovwrap"><div class="av sm" style="background:var(--panel2)"><img src="./${d.character_id}.png" onerror="this.style.display='none';this.parentNode.textContent='!'"></div><div class="hovtip">${esc(RARE_NAMES[d.character_id]||d.character_id)}<br>Roll #${d.won_on_roll} of ${d.roll_count}<br>${new Date(d.created_at).toLocaleString()}</div></div>`).join(''):'<span class="muted small">none yet</span>'}</div></div>`;}).join('')}
  </div>
  <div class="card" style="margin-top:14px"><h3 style="margin-bottom:12px">Recent drops</h3>
    ${(allDrops||[]).length?(allDrops).slice(0,25).map(d=>{const p=profById(d.profile_id);return `<div class="dropfeed-item">
      <div class="av sm" style="background:var(--panel2)"><img src="./${d.character_id}.png" onerror="this.style.display='none';this.parentNode.textContent='!'"></div>
      <span><b style="color:${p?p.color:'#fff'}">${esc(p?p.name:'?')}</b> unlocked <b style="color:var(--gold)">${esc(RARE_NAMES[d.character_id]||d.character_id)}</b> on roll #${d.won_on_roll}</span>
      <span class="muted small" style="margin-left:auto">${new Date(d.created_at).toLocaleDateString()}</span></div>`;}).join(''):'<div class="muted small">No drops yet. Win games to roll.</div>'}
  </div>`;
}

/* ---- CONFETTI ---- */
function fireConfetti(){
  const c=$('#confetti'),x=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;
  const cols=['#f06b9a','#5b8def','#9d6fd9','#f5c451','#7fe0a3'];
  let bits=Array.from({length:140},()=>({x:Math.random()*c.width,y:-20-Math.random()*c.height,
    s:4+Math.random()*6,vy:2+Math.random()*4,vx:-2+Math.random()*4,col:cols[Math.floor(Math.random()*cols.length)],r:Math.random()*6}));
  let frames=0;
  (function loop(){x.clearRect(0,0,c.width,c.height);bits.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.r+=.1;
    x.save();x.translate(b.x,b.y);x.rotate(b.r);x.fillStyle=b.col;x.fillRect(-b.s/2,-b.s/2,b.s,b.s);x.restore();});
    frames++;if(frames<200)requestAnimationFrame(loop);else x.clearRect(0,0,c.width,c.height);})();
}

/* ============ BOOT ============ */
(async function(){ await loadCore(); landing(); })();
</script>
